budget:
  monthly_limit_usd: 1000
  categories:
    - api_calls
    - compute
    - data_services
    - subscriptions
  alert_threshold_pct: 80
  providers:
    anthropic:
      type: api_variable
      key_env: ANTHROPIC_API_KEY
      usage_api: "/v1/organizations/{org}/usage"
    openai:
      type: api_variable
      key_env: OPENAI_API_KEY
      note: "No usage API — cost calculated from token counts"
    openrouter:
      type: api_variable
      key_env: OPENROUTER_API_KEY
      usage_api: "/api/v1/auth/key"
    firecrawl:
      type: api_subscription
      key_env: FIRECRAWL_API_KEY
      monthly_usd: 50
      usage_api: "/v2/team/credit-usage"
    claude_code_max:
      type: fixed_subscription
      monthly_usd: 400
      note: "2x Claude Code Max ($200/account)"
    hetzner:
      type: fixed_subscription
      monthly_usd: 5.50
      note: "CPX21 VPS"

resources:
  claude_code_max:
    plan: max_2
    accounts: 2
    notes: "Two admin researcher accounts. Log into either to monitor and direct work."

apis:
  firecrawl:
    key_env: FIRECRAWL_API_KEY
    purpose: "Web scraping and content extraction for literature review"
    estimated_monthly_cost_usd: 50

openclaw:
  gateway:
    host: "127.0.0.1"
    port: 18789
  budget_allocation_usd: 30
  agents:
    sol:
      role: project_lead
      model: claude-sonnet-4-6
      schedule: "cron 0 7 * * * UTC"
      channel: "#general"
    noor:
      role: research_scout
      model: claude-haiku-4-5-20251001
      model_escalation: claude-sonnet-4-6
      schedule: "heartbeat 6h"
      channel: "#discoveries"
    vera:
      role: quality_critic
      model: claude-sonnet-4-6
      schedule: "cron 0 */2 * * * UTC"
      channel: "#reviews"
    kit:
      role: experimenter
      model: claude-haiku-4-5-20251001
      model_escalation: claude-sonnet-4-6
      schedule: "heartbeat 12h"
      channel: "#experiments"
    maren:
      role: paper_writer
      model: claude-opus-4-6
      model_feedback: claude-sonnet-4-6
      schedule: triggered
      channel: "#writing"

decision_policy:
  mode: autonomous
  reasoning: extended_thinking
  log_all: true
  notes: |
    All decisions are made autonomously by Claude. No human escalation required.
    Use highest reasoning level (extended thinking) for:
    - Research direction choices
    - Methodology design
    - Paper framing and scope
    - Complexity-theoretic claims
    Log every decision in the project's status.yaml for transparency.
