# Example: Self-consistency voting experiment for verification-complexity project

name: self-consistency-voting
status: draft

hypothesis: >
  Self-consistency lift is bounded by error correlation (rho), which tracks
  shared structural bottlenecks rather than VC class (Theorem 2c refined).
  Tasks where all models share the same failure mode (high rho, e.g. B6)
  show less SC lift than tasks with stochastic instance-specific difficulty
  (low rho, e.g. B7).

predictions:
  - tasks: [B7]
    metric: mv_lift_at_n17
    direction: positive
    note: "Lowest between-model rho (0.06) — stochastic errors, SC should help"
  - tasks: [B1, B2, B5, B9]
    metric: mv_lift_at_n17
    direction: moderate_positive
    note: "Low-moderate rho (0.07-0.22) — some independent error component"
  - tasks: [B3, B4]
    metric: mv_lift_at_n17
    direction: small_positive
    note: "Moderate rho (0.22-0.31) — partially shared bottleneck"
  - tasks: [B6]
    metric: mv_lift_at_n17
    direction: near_zero
    note: "Highest rho (0.42) — shared algorithmic gap, SC cannot help"
  - tasks: [B8]
    metric: mv_lift_at_n17
    direction: near_zero
    note: "Ceiling effect (>92% baseline) — no room for improvement"

design:
  condition: short_cot
  temperature: 1.0  # 0.7 showed 96-99% agreement in validation — insufficient diversity
  models: [claude-haiku-4-5-20251001]
  tasks: [B1, B2, B3, B4, B5, B6, B7, B8, B9]
  num_samples: 17
  instances_per_difficulty: 30
  difficulties: [1, 2, 3, 4, 5]

canary:
  tasks: [B6, B7]  # B6 = high rho (shared bottleneck), B7 = low rho (stochastic)
  instances_per_difficulty: 5
  num_samples: 5
  diagnostics:
    - check: extraction_failure_rate
      max: 0.05
    - check: mean_agreement
      max: 0.90  # tightened after T=0.7 validation failure (was 0.95)
      min: 0.40
    - check: baseline_accuracy
      min: 0.10
      max: 0.99
    - check: cost_per_instance
      max_multiple_of_estimate: 2.0

budget:
  estimated_total_usd: 46.00
  estimated_per_instance_usd: 0.034
  canary_cost_usd: 2.00
  max_allowed_usd: 60.00

review:
  status: pending
  reviewer: ""
  date: ""
  verdict_file: ""

created_at: ""
updated_at: ""
