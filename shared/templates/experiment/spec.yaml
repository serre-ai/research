# Experiment Pre-Registration Spec
# Every experiment estimated at >$2 must have this file completed
# before execution. The three-phase pipeline is:
#   1. Experimenter creates spec (status: draft)
#   2. Critic reviews spec (status: reviewed -> approved/rejected)
#   3. Experimenter runs canary, then full experiment (status: running -> complete)

# Human-readable name for this experiment
name: ""

# Current lifecycle status
# draft -> reviewed -> approved -> running -> complete | failed
status: draft

# What this experiment tests — a falsifiable statement
hypothesis: >
  State the hypothesis in one or two sentences. Be precise about which
  theoretical prediction is being tested, which tasks are involved, and
  what outcome would confirm or refute it.

# Measurable predictions that follow from the hypothesis
# Each prediction should specify direction and expected magnitude
predictions:
  - tasks: []               # list of task IDs this prediction covers
    metric: ""              # metric name (e.g., mv_lift_at_n17, cot_lift)
    direction: ""           # positive | negative | near_zero | small_positive
    min_effect: null        # minimum expected effect size (for positive/negative)
    max_effect: null        # maximum expected effect size (for near_zero/small_positive)

# Experimental design
design:
  condition: ""             # e.g., short_cot, long_cot, direct
  temperature: 0.0          # sampling temperature
  models: []                # list of model identifiers
  tasks: []                 # list of task IDs to run
  num_samples: 1            # number of independent samples per instance
  instances_per_difficulty: 30
  difficulties: []          # list of difficulty levels (e.g., [1, 2, 3, 4, 5])

# Canary run configuration — a small-scale test before the full run
# Purpose: catch bugs, validate pipeline, estimate real costs
canary:
  tasks: []                 # subset of design.tasks for the canary run
  instances_per_difficulty: 5
  num_samples: 5
  diagnostics:
    - check: extraction_failure_rate
      max: 0.05
    - check: mean_agreement
      max: 0.95             # must have sample diversity
      min: 0.40             # not pure noise
    - check: baseline_accuracy
      min: 0.10             # not all wrong
      max: 0.99             # not trivially solved
    - check: cost_per_instance
      max_multiple_of_estimate: 2.0

# Budget and resource estimates
budget:
  estimated_total_usd: 0.00
  estimated_per_instance_usd: 0.00
  canary_cost_usd: 0.00
  max_allowed_usd: 0.00

# Review tracking — populated by the critic agent
review:
  status: pending           # pending | approved | rejected
  reviewer: ""
  date: ""
  verdict_file: ""          # path to the full review document

# Timestamps
created_at: ""
updated_at: ""
