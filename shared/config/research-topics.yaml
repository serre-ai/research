# Research topic taxonomy for literature ingestion.
# Papers matching 2+ keywords from any topic are stored in lit_papers.
# Used by LiteratureMonitor for broad filtering beyond project-specific key_terms.

topics:
  - name: llm_reasoning
    display: "LLM Reasoning & Limitations"
    keywords:
      - "reasoning"
      - "chain of thought"
      - "chain-of-thought"
      - "CoT"
      - "step by step"
      - "compositional"
      - "reasoning gap"
      - "reasoning failure"
      - "multi-step"
      - "logical reasoning"

  - name: verification_oversight
    display: "Verification & Oversight"
    keywords:
      - "verification"
      - "reward model"
      - "RLHF"
      - "oversight"
      - "debate"
      - "scalable oversight"
      - "self-consistency"
      - "majority voting"
      - "verifier"
      - "process reward"
      - "outcome reward"

  - name: complexity_expressiveness
    display: "Complexity & Expressiveness"
    keywords:
      - "complexity"
      - "circuit complexity"
      - "TC0"
      - "NC1"
      - "expressiveness"
      - "transformer bounds"
      - "computational complexity"
      - "decidable"
      - "NP-hard"
      - "PSPACE"

  - name: self_improvement
    display: "Self-Improvement"
    keywords:
      - "self-improvement"
      - "self-training"
      - "self-play"
      - "recursive"
      - "self-refinement"
      - "iterative refinement"
      - "self-correction"
      - "constitutional AI"

  - name: benchmarks_evaluation
    display: "Benchmarks & Evaluation"
    keywords:
      - "benchmark"
      - "evaluation"
      - "diagnostic"
      - "dataset"
      - "leaderboard"
      - "contamination"
      - "evaluation methodology"

  - name: ai_safety
    display: "AI Safety"
    keywords:
      - "alignment"
      - "safety"
      - "monitoring"
      - "control"
      - "red teaming"
      - "jailbreak"
      - "misuse"
      - "deception"

  - name: architecture
    display: "Architecture & Efficiency"
    keywords:
      - "attention mechanism"
      - "state space"
      - "mixture of experts"
      - "efficient"
      - "sparse"
      - "long context"
      - "scaling law"
