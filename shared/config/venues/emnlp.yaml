name: emnlp
full_name: "Conference on Empirical Methods in Natural Language Processing"
url: "https://aclweb.org/emnlp"

deadlines:
  2026:
    paper: "2026-06-15"
    notification: "2026-09-15"
    conference: "2026-12-07"
  2027:
    paper: "2027-06-15"  # estimated

acceptance_rate: 0.24
submissions_per_year: ~4500

topic_fit:
  llm_reasoning: high
  verification_oversight: medium
  complexity_expressiveness: low
  self_improvement: low
  benchmarks_evaluation: high
  ai_safety: medium
  architecture: medium

contribution_preferences:
  theory_with_empirical: medium
