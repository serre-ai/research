name: iclr
full_name: "International Conference on Learning Representations"
url: "https://iclr.cc"

deadlines:
  2026:
    paper: "2025-10-01"  # passed
    notification: "2026-01-20"
    conference: "2026-05-04"
  2027:
    paper: "2026-09-25"  # estimated
    notification: "2027-01-20"  # estimated
    conference: "2027-05-03"  # estimated

acceptance_rate: 0.30
submissions_per_year: ~8000

topic_fit:
  llm_reasoning: high
  verification_oversight: high
  complexity_expressiveness: high
  self_improvement: high
  benchmarks_evaluation: high
  ai_safety: high
  architecture: high

contribution_preferences:
  theory_with_empirical: high
  pure_empirical: high
  benchmark_papers: high
  pure_theory: medium
  negative_results: medium

review:
  reviewers: 3
  discussion_period: true
  author_response: true
  double_blind: true
  open_review: true

format:
  page_limit: 9
  references_extra: true
  appendix: unlimited
  anonymous: true
  checklist: optional

notes: "Values clarity and reproducibility above all. Open review process (reviews public on OpenReview). Strong empirical papers with open code do well."
