# Deepwork API — nginx reverse proxy
# Sites-available config: /etc/nginx/sites-available/deepwork-api
#
# Provides:
#   - HTTPS termination (Let's Encrypt)
#   - Reverse proxy to Node.js API on localhost:3001
#   - WebSocket upgrade for /api/ws
#   - Rate limiting
#   - Security headers

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;

upstream deepwork_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    server_name api.deepwork.site;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.deepwork.site;

    # TLS — managed by certbot
    ssl_certificate /etc/letsencrypt/live/api.deepwork.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.deepwork.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Request size limits
    client_max_body_size 1m;

    # WebSocket endpoint
    location /api/ws {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass http://deepwork_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API endpoints
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://deepwork_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Block everything else
    location / {
        return 404;
    }
}
