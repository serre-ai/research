# Forge Platform — nginx config for forge.serre.ai
# Serves: Next.js dashboard (port 3000) + Express API (port 3001) + WebSocket
# Install: sudo cp nginx.conf /etc/nginx/sites-available/deepwork
#          sudo ln -sf /etc/nginx/sites-available/deepwork /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;

upstream deepwork_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream deepwork_site {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name forge.serre.ai;

    # ACME challenge for Let's Encrypt / certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — dashboard + API
server {
    listen 443 ssl http2;
    server_name forge.serre.ai;

    # TLS — managed by certbot (run: sudo certbot --nginx -d forge.serre.ai)
    ssl_certificate /etc/letsencrypt/live/forge.serre.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forge.serre.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Request size limits
    client_max_body_size 1m;

    # --- API: WebSocket endpoint (must come before /api/) ---
    location /api/ws {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass http://deepwork_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- NextAuth routes (handled by Next.js, not Express) ---
    location /api/auth/ {
        proxy_pass http://deepwork_site;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # --- API: REST endpoints (Express on port 3001) ---
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://deepwork_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- Next.js immutable static assets (long cache) ---
    # NOTE: add_header in a location block overrides ALL server-level
    # add_header directives, so security headers must be repeated here.
    location /_next/static/ {
        proxy_pass http://deepwork_site;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }

    # --- Next.js dashboard (all other routes) ---
    location / {
        proxy_pass http://deepwork_site;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Custom error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
