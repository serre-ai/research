name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator:
    name: Orchestrator — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=orchestrator

  site-next:
    name: Site-Next — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=site-next

  deploy:
    name: Deploy to VPS
    needs: [orchestrator, site-next]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy — pull & build
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/deepwork
            git fetch origin
            git checkout main
            git pull

            # Build orchestrator
            npm ci
            npm run build --workspace=orchestrator

            # Build site-next
            npm run build --workspace=site-next

            echo "Build complete: $(git rev-parse --short HEAD) at $(date -u)"

      - name: Restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo systemctl restart deepwork-daemon
            sudo systemctl restart deepwork-site
            echo "Services restarted at $(date -u)"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sleep 5

            # Check API health
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "API health check failed (HTTP $HTTP_CODE)"
              exit 1
            fi
            echo "API health check passed"

            # Check site
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Site health check failed (HTTP $HTTP_CODE)"
              exit 1
            fi
            echo "Site health check passed"

            echo "Deploy verified at $(date -u)"
