name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  orchestrator:
    name: Orchestrator — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=orchestrator

  site-next:
    name: Site-Next — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=site-next

  deploy:
    name: Deploy to VPS
    needs: [orchestrator, site-next]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy — pull & build
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/deepwork

            # Save current commit for potential rollback
            PREV_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: $PREV_COMMIT"
            echo "$PREV_COMMIT" > /tmp/deepwork-prev-commit

            git fetch origin
            git checkout main
            git pull

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: $NEW_COMMIT"

            # Build orchestrator
            npm ci
            npm run build --workspace=orchestrator

            # Build site-next
            npm run build --workspace=site-next

            echo "Build complete: $(git rev-parse --short HEAD) at $(date -u)"

      - name: Restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Restart daemon first (API)
            echo "Restarting deepwork-daemon..."
            sudo systemctl restart deepwork-daemon
            sleep 3

            # Check daemon status
            if ! sudo systemctl is-active --quiet deepwork-daemon; then
              echo "ERROR: deepwork-daemon failed to start"
              sudo systemctl status deepwork-daemon --no-pager || true
              exit 1
            fi
            echo "deepwork-daemon restarted successfully"

            # Restart site
            echo "Restarting deepwork-site..."
            sudo systemctl restart deepwork-site
            sleep 3

            # Check site status
            if ! sudo systemctl is-active --quiet deepwork-site; then
              echo "ERROR: deepwork-site failed to start"
              sudo systemctl status deepwork-site --no-pager || true
              exit 1
            fi
            echo "deepwork-site restarted successfully"

            echo "Services restarted at $(date -u)"

      - name: Health check
        id: healthcheck
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Wait for services to stabilize
            echo "Waiting for services to stabilize..."
            sleep 5

            # Check API health
            echo "Checking API health..."
            for i in {1..3}; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "API health check passed"
                break
              fi
              if [ $i -eq 3 ]; then
                echo "API health check failed after 3 attempts (HTTP $HTTP_CODE)"
                exit 1
              fi
              echo "API not ready, retrying... ($i/3)"
              sleep 3
            done

            # Check site
            echo "Checking site health..."
            for i in {1..3}; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Site health check passed"
                break
              fi
              if [ $i -eq 3 ]; then
                echo "Site health check failed after 3 attempts (HTTP $HTTP_CODE)"
                exit 1
              fi
              echo "Site not ready, retrying... ($i/3)"
              sleep 3
            done

            echo "Deploy verified at $(date -u)"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/deepwork

            # Read previous commit
            if [ -f /tmp/deepwork-prev-commit ]; then
              PREV_COMMIT=$(cat /tmp/deepwork-prev-commit)
              echo "Rolling back to commit: $PREV_COMMIT"

              git checkout $PREV_COMMIT

              # Rebuild both services
              npm ci
              npm run build --workspace=orchestrator
              npm run build --workspace=site-next

              # Restart services
              sudo systemctl restart deepwork-daemon
              sleep 3
              sudo systemctl restart deepwork-site
              sleep 3

              echo "Rollback complete to commit: $(git rev-parse --short HEAD)"

              # Verify rollback
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Rollback successful - API is healthy"
              else
                echo "WARNING: Rollback completed but API health check failed (HTTP $HTTP_CODE)"
              fi

              # Clean up
              rm /tmp/deepwork-prev-commit
            else
              echo "No previous commit found - cannot rollback"
              exit 1
            fi
