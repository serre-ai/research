gaps_identified:
  - "Slack term epsilon is large (~40pp in STaR) when generation-verification gap is favorable - need to characterize epsilon bounds"
  - "Verification capability is task-dependent (solution verification vs step verification vs outcome verification) - need precise definitions"
  - "Verification capability evolves with model scale (Constitutional AI) - framework treats ν₀ as fixed initial condition"
  - "Partial external signals exist on spectrum (Constitutional AI's principles vs full human feedback) - need formalization"

