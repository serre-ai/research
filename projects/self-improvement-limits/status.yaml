      (5) Curriculum design implications

      Key findings:
      - Found critical paper (Tian et al. 2025) providing empirical model of solver-verifier
        gap dynamics with explicit convergence formulas
      - Identified three theoretical frameworks: Banach (contraction → uniqueness),
        Tarski (monotone on lattice → multiple fixed points), and Nash equilibrium (game theory)
      - Self-improvement likely has MULTIPLE fixed points (not unique) based on local minima
        evidence and empirical reward hacking observations
      - Initial conditions determine which basin of attraction, hence which fixed point
      - Escaping requires external intervention: curriculum, verification data, or dynamics changes
      - Recent 2025 work on curriculum learning shows 15-22% gains from strategic data ordering

      Identified 5 major gaps our paper should fill:
      1. No rigorous fixed-point existence proof for general self-improvement
      2. Uniqueness conditions not characterized theoretically
      3. Initial condition dependence formalized empirically but not theoretically
      4. Escaping via curriculum/external data not formalized
      5. Self-play fixed points not connected to Nash equilibrium theory

      Recommendations for Theorist:
      - Add theorem on initial condition dependence (continuous dependence on Ver(M_0))
      - Add theorem on escaping fixed points via external verification
      - Characterize uniqueness conditions (when is fixed point unique vs multiple?)
      - Derive convergence rate (exponential decay following Tian et al.)
      - Prove bounds are tight with construction

      Papers surveyed: 35+ across fixed-point theory, RL convergence, self-improvement
      in LLMs (2024-2025), game theory, curriculum learning, and training dynamics.

  - date: 2026-03-22
    agent: Researcher
    turns_used: 25
    budget_used: 2.50
    objective: "Generation-verification gap characterization (DW-67)"
    outcome: "Comprehensive survey of GV-gap literature with critical finding: large gap LIMITS improvement (counterintuitive)"
    linear_issue: DW-67
    deliverables:
      - notes/02-generation-verification-gap-characterization.md (comprehensive research note: ~650 lines)
      - status.yaml (updated with 30+ new papers, 8 new gaps identified)
    notes: |
      Conducted comprehensive literature survey on generation-verification gap requested in DW-67.
      Surveyed 30+ additional papers across:
      (1) GV-gap formalization (Mind the Gap - ICLR 2025, Tian et al.)
      (2) Computational complexity (P vs NP, verification asymmetry)
      (3) Process vs outcome reward models
      (4) Reward hacking and verification collapse
      (5) Information-theoretic bounds
      (6) Mathematical proof and code verification complexity

      CRITICAL FINDING - Counterintuitive result:
      Large GV-gap LIMITS self-improvement, not enables it! Improvement bound f(g_D) is
      monotonically DECREASING in gap size. When verification is much easier than generation,
      verification provides weak signal about generation quality, creating information bottleneck.

      Key findings:
      - "Mind the Gap" (ICLR 2025) formalizes GV-gap, proves gap saturation to 0 in few rounds
      - Collapsed gap (Ver ≈ Gen) → no self-improvement possible (confirmed empirically)
      - Large gap → f(g_D) → 0 (minimal improvement despite large gap)
      - Optimal regime: SMALL gap with reliable verification (e.g., code with tests)
      - Process reward models exploit small step-level gaps (why PRMs work)
      - Connection to P vs NP: verification easier than generation is fundamental asymmetry
      - Reward hacking occurs when verification unreliable (large gap or collapsed gap)

      Identified 8 new gaps our paper should fill:
      1. No explicit formula for f(g_D) derived
      2. Monotonicity not rigorously proved
      3. Collapsed gap case not formalized as theorem
      4. Large gap limit not characterized
      5. Task-level vs model-level gap relationship unclear
      6. Information-theoretic characterization incomplete
      7. Process vs outcome reward gap not unified
      8. Complexity-theoretic connection not formalized

      Recommendations for Theorist:
      - Derive explicit f(g_D) (exponential, power law, or rational function)
      - Prove monotonicity: ∂(γ_max - γ_0)/∂g_D < 0
      - Add collapsed gap impossibility theorem: lim_{g_D→0} f(g_D) = 0
      - Add large gap limit: lim_{g_D→∞} f(g_D) = 0 with rate characterization
      - Connect to information theory: f(g_D) ≤ h(I(Ver_M; Quality))
      - Extend to multi-step settings (PRMs)

      Papers surveyed: 30+ new papers on GV-gap, complexity theory, reward models, and
      verification systems. Total literature survey: 65+ papers across all topics.

