# Next steps
next_steps:
  - agent: Researcher
    task: "Conduct comprehensive literature survey"
    priority: high
    estimated_effort: "3-5 sessions"
    notes: |
      Survey three areas: (1) self-improvement methods in LLMs (STaR, ReST, Constitutional AI),
      (2) verification and evaluation without ground truth, (3) impossibility results and
      negative results in learning theory. Identify gaps and position the contribution.

  - agent: Theorist
    task: "Develop formal framework for self-improvement"
    priority: high
    estimated_effort: "8-12 sessions"
    notes: |
      Formalize self-training, self-refinement, and self-play as iterative processes.
      Define verification capability, generation capability, and the gap between them.
      Develop mathematical framework suitable for proving convergence and bounds.

  - agent: Theorist
    task: "Prove core impossibility theorems"
    priority: high
    estimated_effort: "8-12 sessions"
    notes: |
      Prove: (1) Fixed-point convergence for self-improvement without verification,
      (2) Bounds on capability gains as function of verification-generation gap,
      (3) Conditions under which self-play provides verification.
      All proofs must be rigorous and complete.

  - agent: Writer
    task: "Draft paper incorporating theoretical framework"
    priority: medium
    estimated_effort: "5-8 sessions"
    notes: |
      Only begin after theoretical framework and proofs are complete. Integrate formal
      results into narrative, provide intuitions, include examples. Target: clear
      presentation accessible to ML researchers without heavy theory background.

