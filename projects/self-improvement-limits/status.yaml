decisions_made:
  - date: 2026-03-21
    decision: "Target ICLR 2027 as primary venue, abandon NeurIPS 2026"
    rationale: "ICLR is a strong venue for theoretical ML work with safety implications. Sep/Oct 2026 deadline gives ~6 months for a theory-heavy project. UPDATE 2026-03-24: NeurIPS 2026 (May deadline) is only 6 weeks away, insufficient for fixing FATAL issues (need 6-10 weeks). ICLR 2027 is the only realistic target."
  - date: 2026-03-21
    decision: "Position as impossibility results rather than algorithmic contributions"
    rationale: "Impossibility results are the distinctive contribution. Complements reasoning-gaps (what LLMs can't do) with self-improvement-limits (what LLMs can't learn to do on their own). Clear separation from algorithmic self-improvement papers. UPDATE 2026-03-24: Internal review flagged 'impossibility' as overclaim — need to reframe as 'convergence bounds' or 'capability limits'."
  - date: 2026-03-21
    decision: "Scope empirical validation to ~$200 on small models with controlled tasks"
    rationale: "This is primarily a theory paper. Empirical validation confirms theoretical predictions but is not the main contribution. Controlled tasks (arithmetic, logic, constrained writing) provide clean generation-verification gap manipulation. UPDATE 2026-03-24: Internal review shows experiments are CRITICAL (+2.0 points) — worth expanding budget to $200-500 for comprehensive validation."
  - date: 2026-03-22
    decision: "Design comprehensive validation across 4 self-improvement mechanisms"
    rationale: "DW-77 requested experiment design. Extended beyond self-training (already designed in DW-78) to cover self-refinement, self-play, and constitutional AI as mentioned in BRIEF. This provides complete validation of all theoretical claims. Budget allocation: self-training ($100-150) + self-refinement ($35-50) = Phase 1 ($135-200), with optional Phase 2 for self-play and constitutional AI if budget permits."
  - date: 2026-03-22
    decision: "Prioritize self-training and self-refinement experiments first (Phase 1)"
    rationale: "These directly test core theorems (1-3) and resolve FATAL issue #1 from internal review. Self-play and constitutional AI are valuable extensions but not critical for minimum viable validation. Two-phase approach manages budget risk while ensuring critical experiments complete."
  - date: 2026-03-22
    decision: "Use in-context learning instead of fine-tuning for self-improvement simulation"
    rationale: "ICL reduces cost 5× ($100 vs $500) while still testing core theoretical prediction (convergence to verification-bounded fixed point). Trade-off: May underestimate improvement magnitude, but if ICL validates theory, fine-tuning would strengthen it further. This is a cost-effective validation strategy."
  - date: 2026-03-24
    decision: "Pivot from 'build from scratch' to 'fix what exists' strategy"
    rationale: "Meta-review revealed critical status-reality disconnect. status.yaml claimed 'not_started' for components that are substantially complete (paper: 574 lines, notes: 86KB, experiments: designed+simulated). This caused 3 consecutive session failures (avg 15/100). Root cause: agents given wrong instructions. Solution: Honest status update + strategy pivot from building to fixing. Next sessions must focus on: completing proofs (not writing them), running experiments (not designing them), validating against published results (not surveying literature)."

