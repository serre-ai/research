  - date: 2026-03-22
    decision: "Characterize large GV-gap as limiting (not enabling) self-improvement"
    rationale: |
      Linear issue DW-67 requested GV-gap characterization. Literature survey revealed
      counterintuitive finding: LARGE gap limits improvement, not enables it. Key insight
      from "Mind the Gap" (ICLR 2025): improvement bound f(g_D) is monotonically DECREASING
      in gap. When verification is much easier than generation (large gap), verification
      provides weak signal about generation quality, limiting improvement. Optimal regime
      is SMALL gap with reliable verification. This is critical theoretical contribution
      that challenges naive intuition. Decision: Formalize this as core theorem showing
      f(g_D) monotonically decreasing, with f(∞) → 0 and f(0) = small constant.
    agent: Researcher

