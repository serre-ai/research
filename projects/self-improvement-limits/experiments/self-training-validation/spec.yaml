# Experiment Pre-Registration Spec: Self-Training Convergence Validation
# Project: self-improvement-limits
# Created: 2026-03-22
# Purpose: Empirical validation of Theorems 1-3 on self-training convergence bounds

name: "Self-Training Convergence Validation"

# Current lifecycle status
status: draft

# What this experiment tests — a falsifiable statement
hypothesis: >
  Theorem 1 predicts that self-training without external verification converges
  to a fixed point γ_∞ ≤ ν_0 + ε, where ν_0 is initial verification capability
  and ε is a bounded slack term. We test this by running self-training loops on
  three tasks with varying generation-verification gaps: GSM8K (moderate gap),
  HumanEval (small gap), and WritingPrompts (large gap). We predict that:
  (1) All tasks show convergence within 10 iterations,
  (2) Final generation capability γ_∞ correlates strongly with initial
      verification capability ν_0 (r > 0.8),
  (3) Small-gap tasks (HumanEval) show larger improvement than large-gap tasks
      (WritingPrompts), consistent with Theorem 3.

# Measurable predictions that follow from the hypothesis
predictions:
  - tasks: ["gsm8k", "humaneval", "writingprompts"]
    metric: "convergence_within_10_iterations"
    direction: "positive"
    min_effect: 0.85  # At least 85% of runs should converge (γ_t change < 0.02)
    max_effect: 1.00

  - tasks: ["gsm8k", "humaneval", "writingprompts"]
    metric: "correlation_gamma_inf_with_nu_0"
    direction: "positive"
    min_effect: 0.75  # Strong correlation (r > 0.75)
    max_effect: 0.95

  - tasks: ["humaneval"]
    metric: "relative_improvement"
    direction: "positive"
    min_effect: 0.20  # At least 20% improvement from baseline (small gap)
    max_effect: 0.50

  - tasks: ["writingprompts"]
    metric: "relative_improvement"
    direction: "small_positive"
    min_effect: 0.05  # Limited improvement (large gap)
    max_effect: 0.15

  - tasks: ["gsm8k"]
    metric: "relative_improvement"
    direction: "positive"
    min_effect: 0.10  # Moderate improvement (moderate gap)
    max_effect: 0.30

# Experimental design
design:
  # Self-training procedure:
  # For t = 0 to 10:
  #   1. Generate N solutions to problems using M_t
  #   2. Use M_t to verify/judge solution quality
  #   3. Filter top-scoring solutions (p=0.5 threshold)
  #   4. Fine-tune M_{t+1} on filtered examples (or use in-context learning)
  #   5. Measure γ_t (generation accuracy) and ν_t (verification accuracy)

  procedure: "self_training_loop"
  iterations: 10
  temperature: 0.7  # For generation
  verification_temperature: 0.0  # For verification (deterministic)
  filter_threshold: 0.5  # Keep solutions with verification score > 0.5

  models:
    - "claude-3-5-sonnet-20241022"  # Primary model
    # Alternative if budget allows:
    # - "gpt-4o"
    # - "claude-3-opus"

  tasks:
    - id: "gsm8k"
      name: "Grade School Math (GSM8K)"
      description: "Math word problems with numerical answers"
      gap_type: "moderate"  # Verification moderately easier than generation
      test_size: 100  # Evaluate on 100 held-out problems
      train_size: 500  # Generate solutions for 500 problems per iteration

    - id: "humaneval"
      name: "Code Generation (HumanEval)"
      description: "Python function synthesis from docstrings"
      gap_type: "small"  # Verification easy (run tests), generation hard
      test_size: 50  # Evaluate on 50 held-out problems
      train_size: 100  # Generate solutions for 100 problems per iteration

    - id: "writingprompts"
      name: "Creative Writing (WritingPrompts)"
      description: "Story generation from prompts"
      gap_type: "large"  # Verification nearly as hard as generation
      test_size: 50  # Evaluate on 50 held-out prompts
      train_size: 200  # Generate stories for 200 prompts per iteration

  num_samples: 1  # One solution per problem per iteration

  # Measurement protocol
  metrics:
    - name: "gamma_t"
      description: "Generation accuracy at iteration t"
      measurement: "Accuracy on held-out test set"

    - name: "nu_t"
      description: "Verification accuracy at iteration t"
      measurement: "Accuracy when judging (problem, solution) pairs"

    - name: "convergence_iteration"
      description: "First iteration where |γ_t - γ_{t-1}| < 0.02"

    - name: "relative_improvement"
      description: "(γ_∞ - γ_0) / γ_0"

# Canary run configuration
canary:
  tasks: ["gsm8k"]  # Start with one task for canary
  iterations: 3  # Only run 3 iterations for canary
  test_size: 20  # Smaller test set
  train_size: 50  # Fewer training examples

  diagnostics:
    - check: "pipeline_completion"
      description: "All instances produce parseable output"
      success_criterion: "100% of instances complete without errors"

    - check: "accuracy_sanity"
      description: "Initial accuracy γ_0 is reasonable (not 0% or 100%)"
      min: 0.10
      max: 0.90

    - check: "verification_sanity"
      description: "Initial verification ν_0 > γ_0 (verification easier)"
      success_criterion: "ν_0 - γ_0 > 0.05"

    - check: "cost_within_budget"
      max_multiple_of_estimate: 2.0

# Budget and resource estimates
budget:
  # Cost breakdown per task per iteration:
  # - Generation: 500 problems × 1000 tokens/problem × $0.003/1k tokens = $1.50
  # - Verification: 500 problems × 500 tokens × $0.003/1k tokens = $0.75
  # - Fine-tuning: Not applicable (using in-context learning)
  # Total per iteration: ~$2.25
  # Total per task: $2.25 × 10 iterations = $22.50
  # Total all tasks: $22.50 × 3 = $67.50
  # Add 50% buffer: $67.50 × 1.5 = $101.25

  estimated_total_usd: 101.25
  estimated_per_instance_usd: 0.0045  # Per problem per iteration
  canary_cost_usd: 3.50  # 50 problems × 3 iterations × $0.0225
  max_allowed_usd: 150.00  # Hard budget limit (within $200-500 recommended range)

# Review tracking
review:
  status: pending
  reviewer: ""
  date: ""
  verdict_file: ""

# Connection to theoretical framework
theory_mapping:
  theorem_1: "Self-training converges to γ_∞ ≤ ν_0 + ε"
  theorem_3: "Improvement bound f(g_D) monotonically decreases with gap size g_D"

  validation_approach: >
    We measure γ_t and ν_t over iterations, checking:
    (1) Convergence occurs (γ_t plateau)
    (2) γ_∞ ≤ ν_0 + ε holds empirically
    (3) Small-gap task (HumanEval) shows larger improvement than large-gap
        task (WritingPrompts), confirming f(g_D) is monotonically decreasing

# Implementation notes
implementation:
  generation_prompt_template: |
    Solve the following problem:
    {problem}

    Provide your solution:

  verification_prompt_template: |
    Problem: {problem}
    Proposed solution: {solution}

    Is this solution correct? Answer with a score from 0 (completely wrong)
    to 1 (completely correct), followed by a brief explanation.

    Score:

  filtering_strategy: "Keep solutions with verification score ≥ 0.5"

  training_strategy: >
    Use in-context learning rather than fine-tuning. For iteration t+1,
    prepend the best examples from iteration t to the prompt as few-shot
    demonstrations. This avoids fine-tuning costs and makes the experiment
    more reproducible.

