decisions_pending: []

decisions_made:
  - date: 2026-03-07
    decision: "Target NeurIPS 2026 as venue"
    rationale: "Strong fit for work bridging theory and empirical LLM evaluation"
  - date: 2026-03-07
    decision: "Position paper as bridging theory-practice divide"
    rationale: "TC⁰ bounds and empirical failures are studied in isolation. Our contribution: formal mapping between them plus diagnostic benchmarks. Neither pure theory nor pure empirics."
  - date: 2026-03-07
    decision: "Use TC⁰ vs NC¹ vs P as primary complexity framework with conditional claims"
    rationale: "Can make claims like 'if TC⁰ ≠ ≠ NC¹ then...' which are standard. Empirical results provide evidence without requiring resolution of open complexity questions."
  - date: 2026-03-07
    decision: "Include cognitive science framing (System 1/2) in discussion only, not core framework"
    rationale: "Strengthens narrative but over-indexing would dilute technical contribution for NeurIPS audience"
  - date: 2026-03-10
    decision: "Develop rigorous proofs/proof sketches for all 5 propositions before empirical evaluation"
    rationale: "Strengthens theoretical contribution and ensures predictions are formally grounded. Proofs provide clarity on assumptions (conditional on standard complexity conjectures) and tighten bounds on CoT effectiveness."
  - date: 2026-03-10
    decision: "Specify complete empirical analysis plan with statistical tests, visualizations, and success criteria"
    rationale: "Ensures reproducibility and prevents p-hacking. Pre-registration of analyses (6 primary + 3 secondary) with clear hypotheses and statistical methods. Estimated 331K evaluations total across 12 models × 9 tasks × 4 conditions."
  - date: 2026-03-10
    decision: "Implement complete analysis infrastructure before data collection"
    rationale: "Building analysis pipeline before data ensures: (1) no researcher degrees of freedom, (2) pipeline tested and debugged early, (3) immediate analysis once data available, (4) reproducible and version-controlled from start. Includes statistical tests, visualizations, and automated pipeline."

