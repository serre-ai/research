decisions_pending: []

decisions_made:
  - date: 2026-03-07
    decision: "Target NeurIPS 2026 as venue"
    rationale: "Strong fit for work bridging theory and empirical LLM evaluation"
  - date: 2026-03-07
    decision: "Position paper as bridging theory-practice divide"
    rationale: "TC⁰ bounds and empirical failures are studied in isolation. Our contribution: formal mapping between them plus diagnostic benchmarks. Neither pure theory nor pure empirics."
  - date: 2026-03-07
    decision: "Use TC⁰ vs NC¹ vs P as primary complexity framework with conditional claims"
    rationale: "Can make claims like 'if TC⁰ ≠ ≠ NC¹ then...' which are standard. Empirical results provide evidence without requiring resolution of open complexity questions."
  - date: 2026-03-07
    decision: "Include cognitive science framing (System 1/2) in discussion only, not core framework"
    rationale: "Strengthens narrative but over-indexing would dilute technical contribution for NeurIPS audience"
  - date: 2026-03-10
    decision: "Develop rigorous proofs/proof sketches for all 5 propositions before empirical evaluation"
    rationale: "Strengthens theoretical contribution and ensures predictions are formally grounded. Proofs provide clarity on assumptions (conditional on standard complexity conjectures) and tighten bounds on CoT effectiveness."
  - date: 2026-03-10
    decision: "Specify complete empirical analysis plan with statistical tests, visualizations, and success criteria"
    rationale: "Ensures reproducibility and prevents p-hacking. Pre-registration of analyses (6 primary + 3 secondary) with clear hypotheses and statistical methods. Estimated 331K evaluations total across 12 models × 9 tasks × 4 conditions."
  - date: 2026-03-10
    decision: "Implement complete analysis infrastructure before data collection"
    rationale: "Building analysis pipeline before data ensures: (1) no researcher degrees of freedom, (2) pipeline tested and debugged early, (3) immediate analysis once data available, (4) reproducible and version-controlled from start. Includes statistical tests, visualizations, and automated pipeline."
  - date: 2026-03-10
    decision: "Replace Mistral-Large (123B) with Mistral-Small-24B-Instruct-2501 in evaluation matrix"
    rationale: "Mistral-Large-Instruct-2411 (123B) requires 2x A100-80GB with tensor parallelism, adding infra complexity and cost. Mistral-Small-24B fits on single A100-80GB, still provides 3.4x scale gap vs 7B for within-family scaling analysis. Trade-off: less extreme scale contrast, but practical and reliable."
  - date: 2026-03-10
    decision: "Use Modal serverless GPU for open-source model inference instead of dedicated Hetzner server"
    rationale: "Scale-to-zero billing means we only pay for active inference time (~$272-515 estimated). No idle GPU costs during development. Individual model endpoints scale independently. Cold starts (~2-3 min) acceptable for batch evaluation."
  - date: 2026-03-11
    decision: "Use OpenRouter API for open-source model evaluation instead of Modal GPU deployment"
    rationale: "OpenRouter provides simple API access to all 6 open-source models with no infrastructure setup. Total cost ~$0.22 vs estimated $100-200 for Modal GPU time. Eliminates cold start delays, GPU provisioning, and Modal configuration. vLLM client preserved in codebase for reproducibility validation if needed."
  - date: 2026-03-11
    decision: "Replace Mistral-7B-Instruct-v0.3 with Ministral-8B-2512 in evaluation matrix"
    rationale: "Mistral-7B-Instruct-v0.3 not available on OpenRouter. Ministral-8B-2512 is the closest available model in size and family, maintaining the small/large scale contrast within the Mistral family for scaling analysis."
  - date: 2026-03-11
    decision: "Run all 6 open-source models in parallel via separate processes"
    rationale: "Parallelizing across 6 models reduced total wall-clock time from ~30 hours (sequential) to ~5 hours. Each model runs independently with its own checkpoint file, so no coordination overhead or failure propagation."

