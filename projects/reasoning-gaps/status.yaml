project: reasoning-gaps
title: "On the Reasoning Gaps of Large Language Models: A Formal Characterization"
venue: NeurIPS 2026
created: 2026-03-07

phase: formal-framework
status: active

progress:
  literature_review:
    status: completed
    notes: "Surveyed 27 papers across 7 themes. Coverage: transformer expressiveness (TC⁰ bounds), working memory limits, compositional failures, counterfactual reasoning, emergence/scaling, mitigation strategies. Files: notes/literature-review.md, notes/gap-analysis.md"
    papers_surveyed: 27
    completion_date: 2026-03-10
  formal_framework:
    status: completed
    notes: "Defined reasoning gap formally as tuple (P,M,D,δ,θ). Classified gaps: architectural/capacity/training. Formalized 6 gap types with complexity-theoretic grounding. Characterized CoT effectiveness via serial decomposability. Connected to all hypotheses H1-H3. File: notes/framework.md"
    completion_date: 2026-03-11
  taxonomy:
    status: completed
    notes: "Organized 9 gap types into 3 categories (computational/resource/distributional). Each characterized across complexity theory, architecture, empirical dimensions. Includes diagnostic framework and mitigation guidance. File: notes/taxonomy.md"
    completion_date: 2026-03-11
  benchmark_design:
    status: completed
    notes: "Designed 9 diagnostic benchmarks (B1-B9) with controlled difficulty parameters. ~3000 instances total. Defined evaluation protocol, statistical analysis plan. Budget estimate: $600. File: notes/benchmark-design.md"
    completion_date: 2026-03-11
  benchmark_implementation:
    status: not_started
    notes: "Implement generators for benchmarks B1-B9. Start with B1 (compositional), B3 (working memory), B5 (counterfactual)"
  empirical_evaluation:
    status: not_started
    notes: "Run evaluation across ≥3 model families at multiple scales. Test with/without CoT. Generate performance curves and statistical analysis."
  paper_writing:
    status: not_started
    notes: "Draft paper targeting NeurIPS 2026 format. Sections: intro, related work, formal framework, taxonomy, benchmarks, empirical results, discussion"

decisions_pending: []

decisions_made:
  - date: 2026-03-07
    decision: "Target NeurIPS 2026 as venue"
    rationale: "Strong fit for work bridging theory and empirical LLM evaluation"

  - date: 2026-03-11
    decision: "Define 9 gap types organized into 3 categories"
    rationale: "Provides comprehensive coverage while maintaining theoretical coherence. Categories (computational/resource/distributional) map cleanly to scale-invariant/scale-dependent/training-dependent distinctions"

  - date: 2026-03-11
    decision: "Design 9 benchmarks covering all major gap types with ~3000 instances total"
    rationale: "Balances comprehensive coverage with feasibility. 9 benchmarks allow statistical power while remaining within budget (~$600 estimated API costs). Controlled parameters enable hypothesis testing for H1-H3"

  - date: 2026-03-11
    decision: "Formalize CoT effectiveness via serial decomposability"
    rationale: "Provides precise characterization of when CoT helps (serially decomposable problems) vs. when it only masks gaps (distribution-dependent success). Directly addresses H2"

  - date: 2026-03-11
    decision: "Evaluate across ≥3 model families at multiple scales"
    rationale: "Required for testing H3 (scale dependence). Minimum 3 families ensures robustness. Multiple scales within families isolates architectural vs capacity effects"

