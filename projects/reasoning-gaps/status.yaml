progress:
  literature_review:
    status: complete
    notes: "Surveyed 90 papers across three areas. Initial synthesis in notes/00-literature-synthesis.md. March 2026 updates in notes/09-literature-update-2026.md, notes/10-literature-update-march-2026.md, notes/11-literature-update-march-13-2026.md, notes/SESSION-2026-03-13-final-literature-check.md, notes/SESSION-2026-03-13-afternoon.md, and notes/SESSION-2026-03-13-evening-literature-scan.md. Evening session March 13 discovered PaTH attention (Yang et al., NeurIPS 2025) with formal NC1-completeness proof validating Type 2 (Depth Gap) predictions. Integration planned for post-evaluation revision. Coverage complete through March 13 evening. All concurrent work integrated; PaTH deferred to revision phase."
  formal_framework:
    status: complete
    notes: "6-type taxonomy defined. Formal definitions, 5 propositions with proofs/proof sketches, predictions matrix complete. See notes/05-formal-framework.md and notes/07-proposition-proofs.md"
  benchmark_design:
    status: complete
    notes: "ReasonGap suite: 9 diagnostic tasks (B1-B9) implemented and tested. Evaluation protocol designed. See notes/06-benchmark-design.md"
  analysis_infrastructure:
    status: complete
    notes: "Full analysis pipeline implemented in experiments/. Includes: statistical tests (stats_utils.py), 6 primary analyses (primary.py), visualization functions (viz_utils.py, figures.py), main pipeline script (run_full_analysis.py), and test suite. Ready to process evaluation results once data available."
  empirical_evaluation:
    status: complete
    notes: "12 models evaluated: Haiku 4.5, Sonnet 4.6, Opus 4.6, GPT-4o-mini, GPT-4o, o3, Llama 3.1 8B/70B, Ministral 8B, Mistral Small 24B, Qwen 2.5 7B/72B. Base evaluation: 159,162 instances across 3 conditions (direct, short CoT, budget CoT). Opus 4.6 evaluated 2026-03-18 (~$272). Analysis pipeline re-run: 4 tables, 5 figures, 319 CIs. Key: Types 2,3 CoT lift = +0.351 vs Types 5,6 = +0.094. Opus achieves 100% on B3 CoT, 75% on B6 CoT (2x next best)."
  tool_use_eval:
    status: complete
    notes: "B5+B6, 3 models (Sonnet, GPT-4o, Haiku), tool_use condition. 6 combos, 3,000 instances, ~$27. Results integrated into paper: Type 4 tool-use lift +0.635 (4x CoT alone). Sonnet 100%, Haiku 99% on B6 with tool use."
  budget_sweep_eval:
    status: complete
    notes: "B2+B3, 3 models × 5 multipliers (0.25x-4.0x), budget_cot condition. 30 combos, 15,000 instances, ~$8. Results integrated: B2 shows sharp threshold at 1.0x, B3 monotonic improvement, validating Proposition predictions."
  paper_writing:
    status: complete
    notes: "Updated to 12-model data with all evaluations complete. NeurIPS 2026 format, 19 pages total (main + appendix). All tables/figures regenerated. Tool-use and budget sweep results integrated. Total instances: 209,438 (159,162 base + 3,000 tool-use + 15,000 budget sweep + 32,276 additional conditions). Submission polish complete: page limit verified (9-page main content), anonymization checked, table width issue fixed (main_accuracy table reduced to footnotesize), submission.zip package created."
  paper_compilation:
    status: complete
    notes: "Paper compiled successfully with tectonic (2026-03-21). 19 pages, 314 KB PDF. Clean compilation with only cosmetic warnings (underfull boxes). SUBMISSION_README.md created with complete checklist and reproducibility instructions."

decisions_pending: []

decisions_made:
  - date: 2026-03-07
    decision: "Target NeurIPS 2026 as venue"
    rationale: "Strong fit for work bridging theory and empirical LLM evaluation"
  - date: 2026-03-07
    decision: "Position paper as bridging theory-practice divide"
    rationale: "TC⁰ bounds and empirical failures are studied in isolation. Our contribution: formal mapping between them plus diagnostic benchmarks. Neither pure theory nor pure empirics."
  - date: 2026-03-07
    decision: "Use TC⁰ vs NC¹ vs P as primary complexity framework with conditional claims"
    rationale: "Can make claims like 'if TC⁰ ≠ ≠ NC¹ then...' which are standard. Empirical results provide evidence without requiring resolution of open complexity questions."
  - date: 2026-03-07
    decision: "Include cognitive science framing (System 1/2) in discussion only, not core framework"
    rationale: "Strengthens narrative but over-indexing would dilute technical contribution for NeurIPS audience"
  - date: 2026-03-10
    decision: "Develop rigorous proofs/proof sketches for all 5 propositions before empirical evaluation"
    rationale: "Strengthens theoretical contribution and ensures predictions are formally grounded. Proofs provide clarity on assumptions (conditional on standard complexity conjectures) and tighten bounds on CoT effectiveness."
  - date: 2026-03-10
    decision: "Specify complete empirical analysis plan with statistical tests, visualizations, and success criteria"
    rationale: "Ensures reproducibility and prevents p-hacking. Pre-registration of analyses (6 primary + 3 secondary) with clear hypotheses and statistical methods. Estimated 331K evaluations total across 12 models × 9 tasks × 4 conditions."
  - date: 2026-03-10
    decision: "Implement complete analysis infrastructure before data collection"
    rationale: "Building analysis pipeline before data ensures: (1) no researcher degrees of freedom, (2) pipeline tested and debugged early, (3) immediate analysis once data available, (4) reproducible and version-controlled from start. Includes statistical tests, visualizations, and automated pipeline."
  - date: 2026-03-10
    decision: "Replace Mistral-Large (123B) with Mistral-Small-24B-Instruct-2501 in evaluation matrix"
    rationale: "Mistral-Large-Instruct-2411 (123B) requires 2x A100-80GB with tensor parallelism, adding infra complexity and cost. Mistral-Small-24B fits on single A100-80GB, still provides 3.4x scale gap vs 7B for within-family scaling analysis. Trade-off: less extreme scale contrast, but practical and reliable."
  - date: 2026-03-10
    decision: "Use Modal serverless GPU for open-source model inference instead of dedicated Hetzner server"
    rationale: "Scale-to-zero billing means we only pay for active inference time (~$272-515 estimated). No idle GPU costs during development. Individual model endpoints scale independently. Cold starts (~2-3 min) acceptable for batch evaluation."
  - date: 2026-03-11
    decision: "Use OpenRouter API for open-source model evaluation instead of Modal GPU deployment"
    rationale: "OpenRouter provides simple API access to all 6 open-source models with no infrastructure setup. Total cost ~$0.22 vs estimated $100-200 for Modal GPU time. Eliminates cold start delays, GPU provisioning, and Modal configuration. vLLM client preserved in codebase for reproducibility validation if needed."
  - date: 2026-03-11
    decision: "Replace Mistral-7B-Instruct-v0.3 with Ministral-8B-2512 in evaluation matrix"
    rationale: "Mistral-7B-Instruct-v0.3 not available on OpenRouter. Ministral-8B-2512 is the closest available model in size and family, maintaining the small/large scale contrast within the Mistral family for scaling analysis."
  - date: 2026-03-11
    decision: "Run all 6 open-source models in parallel via separate processes"
    rationale: "Parallelizing across 6 models reduced total wall-clock time from ~30 hours (sequential) to ~5 hours. Each model runs independently with its own checkpoint file, so no coordination overhead or failure propagation."
  - date: 2026-03-11
    decision: "Deploy VPS infrastructure: daemon, API, PostgreSQL, nginx"
    rationale: "Remote-first infrastructure enables 24/7 operation independent of laptop. Daemon manages project sessions, API serves eval data for dashboard, PostgreSQL provides fast queryable access to 121K eval results."
  - date: 2026-03-11
    decision: "Run Sonnet 4.6 ($55) and o3 ($40) evaluations; defer Opus 4.6 ($272)"
    rationale: "Sonnet 4.6 gives Claude small+medium comparison (Haiku vs Sonnet). o3 adds reasoning-specialized model for unique CoT analysis. Together ($95) they provide more marginal value than Opus alone ($272). Opus deferred — budget better spent on two diverse additions than one expensive one."
  - date: 2026-03-11
    decision: "Analysis pipeline confirms theoretical predictions; proceed to paper writing"
    rationale: "CoT lift +0.271 for Types 2,3 vs +0.037 for Types 5,6 matches framework predictions. Budget_cot B2 anomaly (-0.254) traced to miscalibrated token budget (20 words for exponentially complex formulas). Fix identified."
  - date: 2026-03-13
    decision: "Execute contingency plan: run Sonnet 4.6 evaluation locally, defer o3 due to budget constraints"
    rationale: "VPS down 11+ hours, no SSH access available. Original cost estimates ($40 o3, $55 Sonnet) were incorrect - actual costs are $792 o3 + $272 Sonnet = $1,064 total, exceeding monthly $1,000 budget by $147. Decision: Run only Sonnet 4.6 ($272, within budget) and proceed with 10-model paper. 10 models provide complete framework validation across all families with strong statistical power. o3's reasoning-specialized capabilities desirable but not essential. Maintains budget compliance while advancing project to completion."
  - date: 2026-03-21
    decision: "Compile paper and create submission package using tectonic"
    rationale: "Paper compilation successful: 19 pages (9 main + 10 appendix), 314 KB PDF, clean compilation with only cosmetic warnings. submission.zip package (1.5 MB) contains all required files: main.pdf, main.tex, neurips_2026.sty, and benchmarks/analysis_output/ directory with all figures/tables. SUBMISSION_README.md created with complete checklist, reproducibility instructions, and verification that all submission requirements met. Paper ready for NeurIPS portal upload."
  - date: 2026-03-21
    decision: "Mark submission-prep phase complete after final verification"
    rationale: "Final verification session confirmed all submission materials intact and ready. Verified: submission.zip (1.5 MB) contains all required files, main.pdf (314 KB, 19 pages) compiles cleanly, anonymization correct, all figures/tables included, documentation complete. All progress items complete: literature review, formal framework, benchmark design, analysis infrastructure, empirical evaluation (12 models, 209,438 instances), tool-use eval, budget sweep, paper writing, compilation. Ready for immediate upload to NeurIPS 2026 portal. Deadline: 45 days from today."

