notes: "Literature review phase substantially complete. Strong foundation established. The key insight: reasoning gaps correspond to problems outside TC⁰ requiring serial depth exceeding the forward pass. CoT closes gaps for bounded serial composition but not unbounded recursion/search. Ready to formalize."
