  - "[Strobl24-Survey] Strobl et al., 2024 - What Formal Languages Can Transformers Express? A Survey (TACL)"
  - "[MemCap24] Wang et al., 2024 - Self-Attention Limits Working Memory Capacity (NeurIPS)"
  - "[CoT-Mirage] Zhang et al., 2025 - Is Chain-of-Thought Reasoning a Mirage? (arXiv)"
  - "[Comp-Collapse] Wang et al., 2024 - Compositional Generalization in LLMs"
  - "[CF-Knowledge] Chen et al., 2025 - Can LLMs Reconcile Knowledge Conflicts in Counterfactual Reasoning? (arXiv)"
  - "[Exec-CF] Miller et al., 2024 - LLMs Must Think Thrice to Solve Executable Counterfactuals (OpenReview)"
  - "[Abstract-Reason] Kumar et al., 2024 - Large Language Models Are Not Strong Abstract Reasoners (IJCAI)"
  - "[Emergent-Survey] Liu et al., 2025 - Emergent Abilities in Large Language Models: A Survey (arXiv)"

gaps_identified:
  - "Gap 1 (CRITICAL): No formal definition bridging empirical failures to complexity-theoretic bounds"
  - "Gap 2 (HIGH): No unified taxonomy connecting complexity, architecture, and empirical patterns"
  - "Gap 3 (HIGH): CoT effectiveness not formally characterized - gap closure vs masking unclear"
  - "Gap 4 (MEDIUM-HIGH): No principled distinction between scale-dependent and scale-invariant gaps"
  - "Gap 5 (MEDIUM): No unified diagnostic benchmark with complexity grounding"
  - "Gap 6 (MEDIUM): No systematic framework for selecting architectural vs prompt-based mitigations"

current_activity: "Completed formal framework, taxonomy, and benchmark design. Ready to begin implementation phase."

next_steps:
  - "Implement benchmark generators (B1, B3, B5 first as core representatives)"
  - "Pilot evaluation on single model to validate benchmarks"
  - "Refine benchmarks based on pilot results"
  - "Execute full multi-model evaluation"
  - "Statistical analysis and hypothesis testing"
  - "Begin paper drafting with completed theoretical framework"

