notes: "BREAKTHROUGH SESSION (2026-03-25): Taxonomy development substantially complete after intensive 3-phase grounded theory analysis. (1) Open coding: 50 instances → 150 codes → 9 categories. (2) Axial coding: 5 relationship types identified, hierarchical structure with 24 sub-categories, boundary criteria refined. (3) LLM limitation mapping: 8 capability dimensions (C1-C8) defined, all failures mapped to root causes, 5 fundamental vs 8 correctable limitations distinguished, 6 design principles derived. Key theoretical contributions: (a) Dual-view taxonomy: symptom-based (practitioners) + cause-based (researchers), (b) Architecture-failure correlation matrix showing which architectures exhibit which failures, (c) Fundamental vs correctable distinction guides research priorities, (d) Bridge to reasoning-gaps project via C1-C8 capability framework. Novel findings: C3 (meta-cognitive monitoring) and C7 (self-correction) are most pervasive limitations - agents fundamentally cannot evaluate their own work reliably. Concurrent work differentiation now clear: our 9-category hierarchical structure with theoretical grounding vs competitor's 37-category flat taxonomy from production data. Our advantage is theory and design principles; their advantage is empirical scale. Controlled experiments needed to validate architecture correlation claims. Paper writing can begin."
