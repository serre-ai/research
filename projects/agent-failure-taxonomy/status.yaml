decisions_pending: []

decisions_made:
  - date: 2026-03-10
    decision: "Target ACL 2027 as venue"
    rationale: "Strong fit for survey-style work on language agents. February 2027 deadline gives ~11 months. ACL has a track record of accepting impactful survey/taxonomy papers in NLP."
  - date: 2026-03-10
    decision: "Use grounded theory methodology for taxonomy development"
    rationale: "Avoids imposing categories prematurely. Iterative coding from data produces more natural and comprehensive taxonomies than top-down approaches."
  - date: 2026-03-21
    decision: "Reactivate project"
    rationale: "Starting alongside verification-complexity and self-improvement-limits to form a coherent research program. Literature survey is the immediate priority."
  - date: 2026-03-24
    decision: "Focus on single-agent failures first, defer multi-agent coordination"
    rationale: "MAST taxonomy (2025) already covers multi-agent failures comprehensively. Our differentiation is hierarchical single-agent taxonomy with architecture comparison and LLM limitation mapping. Avoid scope overlap."
  - date: 2026-03-24
    decision: "Include evaluation/environment failures in taxonomy"
    rationale: "WebArena dropdown issue shows some 'agent failures' are actually environment limitations. Important to distinguish agent vs. evaluation failures — helps practitioners understand whether to fix agent or evaluation infrastructure."
  - date: 2026-03-25
    decision: "Elevate concurrent work risk to HIGH and revise differentiation strategy"
    rationale: "March 2026 paper 'Characterizing Faults in Agentic AI' (37 categories, 385 real-world faults) is direct competition. Must clearly differentiate through: (1) architecture-failure correlation with controlled experiments, (2) LLM limitation mapping bridging to reasoning-gaps project, (3) production vs. benchmark failure comparison, (4) hierarchical structure with explicit boundary criteria. Monitor arXiv weekly for additional concurrent work."
  - date: 2026-03-25
    decision: "Accelerate controlled experiments to establish empirical differentiation"
    rationale: "With comprehensive taxonomies now published, our unique contribution must be empirical: quantitative frequency analysis across architectures, controlled reproduction validation, and architecture selection guidance. Cannot rely on taxonomy alone for novelty."
  - date: 2026-03-25
    decision: "Complete open coding before deep-reading competitor paper"
    rationale: "Grounded theory methodology requires coding from data without prior category frameworks to avoid bias. Deep-reading competitor's 37-category taxonomy before our open coding would contaminate our emergent categories. Our 9 provisional categories emerged naturally from the data and can now be compared to competitor's structure without bias. This preserves methodological integrity while enabling informed differentiation."

