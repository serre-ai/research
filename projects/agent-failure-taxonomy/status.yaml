  - date: 2026-03-29
    decision: "Select ReAct and Reflexion as pilot frameworks"
    rationale: "ReAct is most common architecture with well-documented failures (infinite loops, tool hallucination). Reflexion represents self-correction approach with documented degeneration failures. Both have accessible implementations (LangChain, official repo). Defer AutoGPT and Plan-and-Execute to full validation phase to control pilot scope and cost."
  - date: 2026-03-29
    decision: "Focus pilot on 3 failure modes: tool hallucination (1.1), infinite loops (3.1), self-correction failure (5.2)"
    rationale: "These failures have: (1) High reproducibility (Easy/High from literature), (2) Strong theoretical grounding (map to C6, C3, C7 LLM limitations), (3) Clear architecture predictions (ReAct vs Reflexion should differ), (4) Observable outcomes (can be detected automatically). Cover 3 major taxonomy categories. Starting with broader set (6-8 failures) would exceed pilot budget and delay validation."
  - date: 2026-03-29
    decision: "Set pilot budget at $32 estimated, $50 max"
    rationale: "Conservative estimate: 80 runs × $0.40/run = $32. 50% buffer ($50 max) accounts for: (1) Possible iteration overruns (infinite loops cost more), (2) Framework overhead, (3) Debugging runs. Canary run ($3.60) validates cost assumptions before committing to full pilot. Budget is <10% of full validation estimate ($200-400), appropriate for infrastructure validation phase."
  - date: 2026-03-29
    decision: "Require pre-registration spec with critic review before experiments >$2"
    rationale: "Enforces experimental rigor: (1) Pre-registering hypotheses prevents p-hacking, (2) Critic review catches design flaws before expensive runs, (3) Canary diagnostics validate infrastructure before full experiments, (4) Documented predictions enable objective success evaluation. This is standard practice in empirical research but rarely enforced in ML experiments. Strengthens paper's methodological credibility."

