decisions_made:
  - date: 2026-03-10
    decision: "Target ACL 2027 as venue"
    rationale: "Strong fit for survey-style work on language agents. February 2027 deadline gives ~11 months. ACL has a track record of accepting impactful survey/taxonomy papers in NLP."
  - date: 2026-03-10
    decision: "Use grounded theory methodology for taxonomy development"
    rationale: "Avoids imposing categories prematurely. Iterative coding from data produces more natural and comprehensive taxonomies than top-down approaches."
  - date: 2026-03-21
    decision: "Reactivate project"
    rationale: "Starting alongside verification-complexity and self-improvement-limits to form a coherent research program. Literature survey is the immediate priority."
  - date: 2026-03-24
    decision: "Focus on single-agent failures first, defer multi-agent coordination"
    rationale: "MAST taxonomy (2025) already covers multi-agent failures comprehensively. Our differentiation is hierarchical single-agent taxonomy with architecture comparison and LLM limitation mapping. Avoid scope overlap."
  - date: 2026-03-24
    decision: "Include evaluation/environment failures in taxonomy"
    rationale: "WebArena dropdown issue shows some 'agent failures' are actually environment limitations. Important to distinguish agent vs. evaluation failures — helps practitioners understand whether to fix agent or evaluation infrastructure."
  - date: 2026-03-25
    decision: "Elevate concurrent work risk to HIGH and revise differentiation strategy"
    rationale: "March 2026 paper 'Characterizing Faults in Agentic AI' (37 categories, 385 real-world faults) is direct competition. Must clearly differentiate through: (1) architecture-failure correlation with controlled experiments, (2) LLM limitation mapping bridging to reasoning-gaps project, (3) production vs. benchmark failure comparison, (4) hierarchical structure with explicit boundary criteria. Monitor arXiv weekly for additional concurrent work."
  - date: 2026-03-25
    decision: "Accelerate controlled experiments to establish empirical differentiation"
    rationale: "With comprehensive taxonomies now published, our unique contribution must be empirical: quantitative frequency analysis across architectures, controlled reproduction validation, and architecture selection guidance. Cannot rely on taxonomy alone for novelty."
  - date: 2026-03-25
    decision: "Complete open coding before deep-reading competitor paper"
    rationale: "Grounded theory methodology requires coding from data without prior category frameworks to avoid bias. Deep-reading competitor's 37-category taxonomy before our open coding would contaminate our emergent categories. Our 9 provisional categories emerged naturally from the data and can now be compared to competitor's structure without bias. This preserves methodological integrity while enabling informed differentiation."
  - date: 2026-03-25
    decision: "Develop LLM limitation mapping as core differentiation"
    rationale: "Competitor paper has 37 categories from 385 production faults — we cannot compete on scale alone. Our differentiation must be theoretical: mapping agent failures to underlying LLM capability gaps (C1-C8). This bridges to reasoning-gaps project, provides design principles, distinguishes fundamental from correctable failures, and offers research priorities. Dual-view taxonomy (symptom-based for practitioners, cause-based for researchers) serves both audiences. This is novel theoretical contribution competitor lacks."
  - date: 2026-03-25
    decision: "Transition from Research phase to Experimental phase"
    rationale: "META-REVIEW after 3 failed sessions (avg score 8/100). Research objectives complete: 50 instances collected and coded, 9-category taxonomy developed with theoretical grounding (C1-C8 mapping), 24 sub-categories defined. Further researcher 'gap-filling' sessions are counterproductive—taxonomy development is done. Critical path to publication is now empirical validation through controlled experiments. Must assign Experimenter agent (not Researcher) for next 2-3 sessions to build infrastructure and run pilot experiments. Writer agent can work in parallel on introduction/related work. Researcher needed for ONE final task: competitor deep-read before Related Work section."
  - date: 2026-03-25
    decision: "Competitor taxonomy (Shah et al. 2026) is complementary, not competing"
    rationale: "Deep-read revealed only ~20% overlap. Their focus: implementation faults in production systems (dependencies, APIs, configurations) — 87% conventional software issues. Our focus: cognitive/behavioral failures in agent reasoning (planning, self-correction, grounding). Different levels of analysis: component-level vs. agent-level. Their edge: 385 production faults, practitioner validation. Our edge: C1-C8 theoretical LLM limitation mapping, design principles, architecture-failure correlation. Both taxonomies needed: theirs for robust engineering, ours for cognitive reliability. Novelty secure, differentiation clear. Framing strategy: emphasize complementarity and our unique theoretical contribution."
  - date: 2026-03-25
    decision: "Stop assigning Researcher agent - research phase complete"
    rationale: "Four consecutive sessions (3 gap_filling/quality_improvement + 1 meta-review) assigned Researcher when all research objectives complete. Literature surveyed (30+ papers), taxonomy developed (9 categories, 24 sub-categories, C1-C8 mapping), competitor analyzed (Shah et al. deep-read). Continued Researcher assignment repeats failed pattern (avg score 15/100). Phase transition to Experimenter/Writer required. Assigning Researcher again will not advance project. This is a routing issue, not a research issue. See ROUTING-DECISION.md for detailed guidance."
