  - date: 2026-03-30
    decision: "Design pilot experiment with 2 frameworks instead of 4"
    rationale: "Pilot experiment should validate methodology quickly within budget constraints. Selected ReAct and Plan-then-Execute (2 frameworks) rather than all 4 (ReAct, Plan-then-Execute, AutoGPT, Reflexion) to: (1) reduce implementation complexity in initial phase, (2) keep costs within single session budget ($3 estimated vs $5 limit), (3) enable faster iteration if infrastructure issues found, (4) test two architecturally distinct approaches (tight loop vs planning-execution separation). AutoGPT and Reflexion deferred to full experiment after pilot validates infrastructure. This scoping keeps pilot focused on infrastructure validation rather than comprehensive coverage."
  - date: 2026-03-30
    decision: "Select 3 failure scenarios for pilot: tool fabrication, infinite loops, false completion"
    rationale: "Chose failures with: (1) high reproducibility per literature (Instance 18 'Easy', Instance 14 'Medium'), (2) representation across taxonomy categories (Tool-Use 1.1, Planning 3.1, Self-Correction 5.1), (3) coverage of fundamental LLM limitations (C1, C3, C6, C7), (4) expected architecture differentiation (ReAct loops more, Plan-then-Execute false completes more). Deferred context degradation (requires long contexts, higher cost) and cascading errors (more complex setup). These 3 scenarios provide strong test of taxonomy applicability while staying within budget and enabling clear success/failure criteria."
  - date: 2026-03-30
    decision: "Use simulated tools instead of real APIs for controlled experiments"
    rationale: "Simulated tools provide: (1) deterministic behavior for reproducibility, (2) ability to inject specific failure modes (silent git failures, missing stock tools), (3) no external dependencies or API costs, (4) full control over observations to test grounding failures, (5) safety (no actual file operations or external calls). Trade-off: may not capture all real-world tool-use behaviors, but sufficient for validating taxonomy categories and testing architectural differences. Real tool integration can be added in full experiment if needed."

