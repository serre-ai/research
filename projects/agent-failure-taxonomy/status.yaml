notes: "MAJOR MILESTONE (2026-03-25): Open coding phase COMPLETE. All 50 failure instances systematically coded using grounded theory, generating ~150 distinct codes. Identified 9 provisional major categories: (1) Tool-use failures (16 instances), (2) Grounding failures (8), (3) Planning failures (7), (4) State tracking failures (6), (5) Self-correction failures (6), (6) Error recovery failures (4), (7) Error propagation (3), (8) Evaluation/environment failures (5), (9) Security vulnerabilities (2). Documented 9 cross-cutting patterns including state divergence, hallucination under insufficient grounding, infinite loops, error cascading, reasoning paradoxes, scaling limits, external dependency fragility, self-correction limitations, and evaluation issues. Architecture-specific patterns identified for ReAct (tight feedback loop traps, context exhaustion), Reflexion (confirmation bias, degeneration-of-thought), and coding agents (semantic incorrectness, edit cascades, test gaming). Identified 4 fundamental LLM limitations: reasoning-hallucination trade-off, context degradation, scaling failures, hallucination under complexity. Concurrent work risk remains HIGH but our emergent categories provide unbiased foundation for differentiation. Next phase: axial coding to refine boundaries, map to LLM limitations, develop architecture-failure correlation matrix."
