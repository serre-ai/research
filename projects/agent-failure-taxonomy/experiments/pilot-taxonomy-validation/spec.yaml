# Experiment Pre-Registration Spec
# Pilot Experiment: Taxonomy Validation Through Controlled Failure Reproduction

name: "pilot-taxonomy-validation"

status: draft

hypothesis: >
  Agent failures documented in literature (tool fabrication, infinite loops,
  false completion) can be reliably reproduced in controlled settings and will
  map cleanly to our taxonomy categories (1.1, 3.1, 5.1). Furthermore, different
  agent architectures (ReAct vs Plan-then-Execute) will exhibit different failure
  profiles: ReAct will show higher infinite loop rates due to tight observation-action
  coupling, while Plan-then-Execute will show higher false completion rates due
  to planning-execution separation.

predictions:
  - tasks: ["tool_fabrication_1", "tool_fabrication_2", "tool_fabrication_3", "tool_fabrication_4", "tool_fabrication_5", "tool_fabrication_6", "tool_fabrication_7", "tool_fabrication_8", "tool_fabrication_9", "tool_fabrication_10"]
    metric: "failure_reproduction_rate"
    direction: "positive"
    min_effect: 0.60
    max_effect: null
    notes: "Tool fabrication should occur in ≥60% of instances when required tool is absent"

  - tasks: ["infinite_loop_1", "infinite_loop_2", "infinite_loop_3", "infinite_loop_4", "infinite_loop_5", "infinite_loop_6", "infinite_loop_7", "infinite_loop_8", "infinite_loop_9", "infinite_loop_10"]
    metric: "failure_reproduction_rate"
    direction: "positive"
    min_effect: 0.40
    max_effect: null
    notes: "Infinite loops should occur in ≥40% of instances with ambiguous tasks"

  - tasks: ["false_completion_1", "false_completion_2", "false_completion_3", "false_completion_4", "false_completion_5", "false_completion_6", "false_completion_7", "false_completion_8", "false_completion_9", "false_completion_10"]
    metric: "failure_reproduction_rate"
    direction: "positive"
    min_effect: 0.30
    max_effect: null
    notes: "False completion should occur in ≥30% of instances with silent tool failures"

  - tasks: ["infinite_loop_1", "infinite_loop_2", "infinite_loop_3", "infinite_loop_4", "infinite_loop_5", "infinite_loop_6", "infinite_loop_7", "infinite_loop_8", "infinite_loop_9", "infinite_loop_10"]
    metric: "architecture_failure_rate_difference"
    direction: "positive"
    min_effect: 0.15
    max_effect: null
    notes: "ReAct should exhibit ≥15 percentage points higher infinite loop rate than Plan-then-Execute"

  - tasks: ["false_completion_1", "false_completion_2", "false_completion_3", "false_completion_4", "false_completion_5", "false_completion_6", "false_completion_7", "false_completion_8", "false_completion_9", "false_completion_10"]
    metric: "architecture_failure_rate_difference"
    direction: "positive"
    min_effect: 0.10
    max_effect: null
    notes: "Plan-then-Execute should exhibit ≥10 percentage points higher false completion rate than ReAct"

design:
  frameworks: ["react", "plan_execute"]
  scenarios: ["tool_fabrication", "infinite_loop", "false_completion"]
  temperature: 0.0
  models: ["gpt-4-0125-preview"]
  tasks:
    tool_fabrication: ["tool_fabrication_1", "tool_fabrication_2", "tool_fabrication_3", "tool_fabrication_4", "tool_fabrication_5", "tool_fabrication_6", "tool_fabrication_7", "tool_fabrication_8", "tool_fabrication_9", "tool_fabrication_10"]
    infinite_loop: ["infinite_loop_1", "infinite_loop_2", "infinite_loop_3", "infinite_loop_4", "infinite_loop_5", "infinite_loop_6", "infinite_loop_7", "infinite_loop_8", "infinite_loop_9", "infinite_loop_10"]
    false_completion: ["false_completion_1", "false_completion_2", "false_completion_3", "false_completion_4", "false_completion_5", "false_completion_6", "false_completion_7", "false_completion_8", "false_completion_9", "false_completion_10"]
  num_samples: 1
  instances_per_scenario: 10
  max_iterations_react: 20
  max_iterations_plan_execute: 15
  total_executions: 60  # 2 frameworks × 3 scenarios × 10 instances

canary:
  frameworks: ["react", "plan_execute"]
  scenarios: ["tool_fabrication", "infinite_loop"]
  tasks:
    tool_fabrication: ["tool_fabrication_1", "tool_fabrication_2"]
    infinite_loop: ["infinite_loop_1", "infinite_loop_2"]
    false_completion: []  # defer to full run
  instances_per_scenario: 2
  num_samples: 1
  total_executions: 8  # 2 frameworks × 2 scenarios × 2 instances
  diagnostics:
    - check: "pipeline_completion"
      description: "All executions must complete without infrastructure errors"
      threshold: 1.0
      notes: "Any execution failure indicates infrastructure bug"

    - check: "cost_per_instance"
      description: "Cost per instance must be within 2x of estimate"
      max_multiple_of_estimate: 2.0
      notes: "If exceeded, indicates prompt inefficiency or model selection issue"

    - check: "trace_logging"
      description: "Every execution must produce valid JSON trace"
      threshold: 1.0
      notes: "Validates logging infrastructure"

    - check: "failure_detection"
      description: "At least one target failure must be observed in canary"
      min_observed: 1
      notes: "If zero, task design may be flawed"

budget:
  estimated_per_instance_usd: 0.05
  estimated_total_usd: 3.00  # 60 instances × $0.05
  canary_cost_usd: 0.40  # 8 instances × $0.05
  max_allowed_usd: 6.00  # 2x buffer for overruns

  cost_breakdown:
    gpt4_input_per_1k: 0.01
    gpt4_output_per_1k: 0.03
    estimated_tokens_per_instance: 2000  # 1500 input, 500 output
    estimated_cost_per_instance: 0.045  # (1.5×0.01 + 0.5×0.03)

review:
  status: pending
  reviewer: ""
  date: ""
  verdict_file: ""

created_at: "2026-03-30"
updated_at: "2026-03-30"

# Additional metadata specific to this experiment

theoretical_grounding:
  taxonomy_categories_tested:
    - "1.1 - Tool-Use Failures: Selection Failures (Tool Fabrication)"
    - "3.1 - Planning Failures: Progress Monitoring (Infinite Loops)"
    - "5.1 - Self-Correction Failures: Verification Failures (False Completion)"

  llm_capabilities_tested:
    - "C1: Factual Grounding"
    - "C3: Meta-Cognitive Monitoring"
    - "C6: Tool Grounding"
    - "C7: Self-Correction Capability"

  architecture_patterns_tested:
    - "ReAct: Tight observation-action loop"
    - "Plan-then-Execute: Planning-execution separation"

validation_criteria:
  minimum_viable_pilot:
    - "Infrastructure executes all runs without failure"
    - "Reproduce ≥2 of 3 target failures in ≥30% of instances"
    - "Costs within estimated budget (max 2× overage acceptable)"

  strong_outcome:
    - "Reproduce all 3 failures in ≥40% of instances"
    - "Observe statistically significant architecture differences"
    - "Taxonomy categories cleanly classify ≥90% of failures"

next_phase_expansion:
  full_experiment_scope:
    frameworks: ["react", "plan_execute", "autogpt", "reflexion"]
    scenarios: ["tool_fabrication", "infinite_loop", "false_completion", "context_degradation", "state_divergence", "self_correction_failure"]
    models: ["gpt-4", "claude-3-opus", "llama-3-70b"]
    instances_per_scenario: 30
    estimated_cost_usd: 180

notes: |
  This is a pilot experiment to validate infrastructure and methodology before
  committing to the full experimental protocol. Scope is intentionally limited
  to 2 frameworks, 3 scenarios, and 10 instances each to enable rapid iteration
  within budget constraints.

  Success criteria are designed to answer three questions:
  1. Can we build reliable agent experiment infrastructure?
  2. Can we reproduce documented failures in controlled settings?
  3. Do different architectures exhibit different failure profiles?

  If pilot succeeds, proceed to full experiment with expanded scope.
  If pilot fails infrastructure validation, fix bugs and re-run.
  If pilot fails to reproduce failures, redesign task templates.
  If pilot shows no architecture differences, reconsider architecture selection.
