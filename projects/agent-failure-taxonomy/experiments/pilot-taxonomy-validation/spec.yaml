# Experiment Pre-Registration Spec
# Pilot experiment to validate taxonomy categories through controlled failure reproduction
# This experiment tests whether our 9-category taxonomy accurately captures distinct failure modes

name: "pilot-taxonomy-validation"

status: draft

hypothesis: >
  Our 9-category taxonomy (Tool-Use, Grounding, Planning, State Tracking, Self-Correction,
  Error Recovery, Error Propagation, Evaluation/Environment, Security) represents distinct,
  reproducible failure modes that manifest consistently across different agent architectures.
  We predict that: (1) Each failure type is reproducible in controlled settings, (2) Different
  architectures exhibit different failure frequencies but same failure types, (3) Category
  boundaries are clear (failures don't systematically span multiple categories).

predictions:
  - description: "Tool fabrication occurs at >15% rate when tool count exceeds 20"
    tasks: ["tool_fabrication_scaling"]
    metric: "fabrication_rate"
    direction: "positive"
    min_effect: 0.15
    max_effect: null

  - description: "Infinite loop detection fails in >30% of ambiguous tasks without external monitoring"
    tasks: ["infinite_loop_ambiguous"]
    metric: "loop_failure_rate"
    direction: "positive"
    min_effect: 0.30
    max_effect: null

  - description: "False completion reporting occurs at >20% rate on multi-step tasks"
    tasks: ["false_completion_multistep"]
    metric: "false_completion_rate"
    direction: "positive"
    min_effect: 0.20
    max_effect: null

# Experimental design
design:
  # We'll test 3 high-priority failures from different categories
  failures_under_test:
    - id: "tool_fabrication_scaling"
      category: "1. Tool-Use Failures"
      subcategory: "1.1 Selection Failures"
      based_on: "Instance 18"
      description: "Agent fabricates non-existent tools when tool count is high"

    - id: "infinite_loop_ambiguous"
      category: "3. Planning Failures"
      subcategory: "3.1 Progress Monitoring"
      based_on: "Instance 14"
      description: "Agent enters infinite loop on ambiguous tasks without progress detection"

    - id: "false_completion_multistep"
      category: "5. Self-Correction Failures"
      subcategory: "5.1 Verification Failures"
      based_on: "Instance 19, 25"
      description: "Agent reports task complete when objectively incomplete"

  # Test across 3 agent frameworks for architecture comparison
  frameworks:
    - name: "react"
      implementation: "langchain_react"
      description: "ReAct pattern with tool calling"

    - name: "plan_execute"
      implementation: "langchain_plan_execute"
      description: "Plan-then-execute pattern"

    - name: "autonomous_loop"
      implementation: "minimal_autogpt"
      description: "Simple autonomous loop (AutoGPT-style)"

  # Models to test (start with 2 for pilot)
  models:
    - "gpt-4o-mini"  # Cost-effective, representative
    - "claude-3-5-sonnet-20241022"  # Different family for generalization

  # Task instances per failure type
  instances_per_failure: 10  # 10 instances × 3 failures × 3 frameworks × 2 models = 180 trials

  # Evaluation criteria
  success_criteria:
    tool_fabrication_scaling:
      metric: "fabricated_tool_called"
      measurement: "Boolean - did agent call a non-existent tool?"
      ground_truth: "List of valid tools provided in task setup"

    infinite_loop_ambiguous:
      metric: "entered_infinite_loop"
      measurement: "Boolean - did agent repeat same action 5+ times without progress?"
      ground_truth: "Action sequence analysis + task state change detection"

    false_completion_multistep:
      metric: "false_completion_reported"
      measurement: "Boolean - did agent claim completion when task incomplete?"
      ground_truth: "Objective task completion criteria checked externally"

# Canary run configuration
canary:
  # Run small version first to validate infrastructure
  instances_per_failure: 3  # 3 instances × 3 failures × 3 frameworks × 2 models = 54 trials
  frameworks: ["react", "plan_execute"]  # Start with 2 frameworks
  models: ["gpt-4o-mini"]  # Start with cheapest model

  diagnostics:
    - check: pipeline_completion
      description: "All instances produce parseable output"
      max_failure_rate: 0.05

    - check: accuracy_sanity
      description: "Failure rates are neither 0% nor 100%"
      min_failure_rate: 0.05
      max_failure_rate: 0.95

    - check: cost_within_budget
      description: "Actual cost is within 2x of estimate"
      max_multiple_of_estimate: 2.0

    - check: task_generation_deterministic
      description: "Same seed produces same task instance"
      required: true

    - check: ground_truth_computable
      description: "All ground truth values can be computed automatically"
      required: true

# Budget and resource estimates
budget:
  # Cost breakdown:
  # - Tool fabrication: ~200 tokens/instance × 10 instances × 3 frameworks × 2 models = 12k tokens
  # - Infinite loop: ~1000 tokens/instance (needs iteration limit) × 10 × 3 × 2 = 60k tokens
  # - False completion: ~500 tokens/instance × 10 × 3 × 2 = 30k tokens
  # Total: ~102k tokens
  # GPT-4o-mini: $0.15/1M input, $0.60/1M output → ~$0.04
  # Claude 3.5 Sonnet: $3/1M input, $15/1M output → ~$0.92
  # Total estimate: ~$1.00 for full run, ~$0.25 for canary

  estimated_total_usd: 1.50  # Conservative estimate with buffer
  estimated_per_instance_usd: 0.0083  # $1.50 / 180 trials
  canary_cost_usd: 0.30  # ~54 trials with GPT-4o-mini
  max_allowed_usd: 2.50  # Hard limit to prevent runaway costs

# Review tracking
review:
  status: pending
  reviewer: ""
  date: ""
  verdict_file: ""

# Timestamps
created_at: "2026-03-30"
updated_at: "2026-03-30"

# Additional metadata for paper
paper_contribution:
  purpose: "Empirically validate that taxonomy categories are reproducible and architecture-correlated"
  expected_table: "Table 2 - Failure Mode Frequency by Architecture"
  expected_finding: "Each failure type occurs consistently, but frequencies vary by architecture"

# Infrastructure requirements
infrastructure_needed:
  - "Task generators for each failure type (deterministic with seed)"
  - "Framework wrappers for ReAct, plan-execute, autonomous loop"
  - "Logging system to capture full agent traces"
  - "Ground truth verification for each failure type"
  - "Checkpoint system for crash recovery"
  - "Cost tracking per API call"

# Success criteria for pilot
pilot_success_criteria:
  - "At least 2 of 3 failure types are reproducible (>15% occurrence rate)"
  - "Framework differences are observable (>10% delta between highest and lowest)"
  - "Infrastructure produces clean, analyzable data"
  - "Cost estimate is accurate within 50%"

# Next steps if pilot succeeds
scale_up_plan:
  - "Add 3 more failure types (context degradation, tool hallucination, memory corruption)"
  - "Add Reflexion framework for self-correction comparison"
  - "Add GPT-4 and Claude Opus for model family comparison"
  - "Increase instances to 30 per failure for statistical power"
  - "Target total: 6 failures × 4 frameworks × 3 models × 30 instances = 2,160 trials"
  - "Estimated cost: ~$15-20 for full validation"
