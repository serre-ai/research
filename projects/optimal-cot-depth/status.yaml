decisions_pending: []

decisions_made:
  - date: 2026-04-01
    decision: "Target ICLR 2027 as primary venue"
    rationale: "ICLR is strong for theoretical ML work. Sep/Oct 2026 deadline gives ~6 months. Project complements reasoning-gaps (NeurIPS 2026) and verification-complexity (ICLR 2027) — three papers forming a coherent theoretical program on LLM reasoning."
  - date: 2026-04-01
    decision: "Frame as dispute resolution through complexity theory, not just another CoT scaling paper"
    rationale: "Compass contrarian detector identified verified contradictions between three papers on CoT length. The complexity-theoretic framing is what makes our contribution distinctive — existing papers observe the phenomenon but don't explain it. We provide the explanatory theory."
  - date: 2026-04-01
    decision: "Focus on depth (logical steps) not length (tokens)"
    rationale: "Token count conflates reasoning depth with verbosity. Formal results about optimal depth are more precise and theoretically grounded than results about optimal length."

