decisions_made:
  - date: 2026-04-01
    decision: "Target ICLR 2027 as primary venue"
    rationale: "ICLR is strong for theoretical ML work. Sep/Oct 2026 deadline gives ~6 months. Project complements reasoning-gaps (NeurIPS 2026) and verification-complexity (ICLR 2027) — three papers forming a coherent theoretical program on LLM reasoning."
  - date: 2026-04-01
    decision: "Frame as dispute resolution through complexity theory, not just another CoT scaling paper"
    rationale: "Compass contrarian detector identified verified contradictions between three papers on CoT length. The complexity-theoretic framing is what makes our contribution distinctive — existing papers observe the phenomenon but don't explain it. We provide the explanatory theory."
  - date: 2026-04-01
    decision: "Focus on depth (logical steps) not length (tokens)"
    rationale: "Token count conflates reasoning depth with verbosity. Formal results about optimal depth are more precise and theoretically grounded than results about optimal length."
  - date: 2026-04-01
    decision: "Position explicitly as a complexity-theoretic grounding of Wu et al.'s Theorem 4.2"
    rationale: "Literature survey revealed Wu et al. (arXiv:2502.07266) already proves inverted-U optimal length via abstract parameters T (difficulty) and M (capability). Our contribution must be clearly differentiated: we replace T with circuit complexity class (using Li et al.'s T-steps = circuits-of-size-T result) and M with TC^0 bounds. This is a refinement, not a contradiction — Wu et al. show the phenomenon exists, we explain WHY via complexity theory."
  - date: 2026-04-01
    decision: "SafeChain is secondary, not a core dispute paper for our framework"
    rationale: "SafeChain's safety-length tradeoff is orthogonal to complexity-theoretic depth bounds. The core dispute is between Yeo et al. (pro-length on hard tasks) and Wu et al. (inverted-U). SafeChain provides supporting evidence but the mechanism is different (safety misalignment vs. noise accumulation). Downgrade from 'three dispute papers' framing to 'two conflicting findings + safety dimension'."
  - date: 2026-04-01
    decision: "Use accuracy decomposition acc(k) = S(k,s) * R(k,eta) as the formal core"
    rationale: "Decomposing accuracy into computational sufficiency × reliability provides the simplest formal mechanism for the inverted-U. Sufficiency increases with depth (more computation), reliability decreases (more noise). The product has a single maximum. This is cleaner than Wu et al.'s Lambert W approach because it directly connects to Li et al.'s circuit-size result: S(k,s) saturates exactly when k reaches the circuit complexity s(n)."
  - date: 2026-04-01
    decision: "Prove theorems under sharp sufficiency threshold first, extend to smooth later"
    rationale: "Sharp threshold (S jumps to 1 at k=s) gives clean proofs and the right qualitative behavior. Smooth threshold is more realistic but harder to analyze. Strategy: prove main results under sharp assumption, then show robustness under smooth models as extensions. This follows Wu et al.'s approach — their Theorem 4.2 also uses a specific functional form."
  - date: 2026-04-01
    decision: "CORRECTED main theorem: d* = min(c(n), 1/η), not d* = Θ(s(n))"
    rationale: "Self-review found Theorem 2 was wrong. With acc(k) = (k/c)·(1-η)^k, the maximum is at k = 1/η, NOT k = c. For hard tasks (c > 1/η), noise kills accuracy before enough computation accumulates. The correct result reveals a capability ceiling at 1/η — genuinely new vs. Wu et al. This is actually a STRONGER result: it predicts that no task benefits from more than 1/η steps, regardless of difficulty."
  - date: 2026-04-01
    decision: "Replace circuit size s(n) with CoT complexity c(n) as primary parameter"
    rationale: "Circuit SIZE conflates with circuit DEPTH. NC^1 has poly(n) SIZE but O(log n) DEPTH. Using c(n) (minimum CoT steps) avoids this confusion and is the natural quantity. c(n) ≤ s(n) by Li et al., and tight bounds on c(n) exist for specific problems (Amiri, Barcelo)."
  - date: 2026-04-01
    decision: "Demote dispute resolution from theorem to corollary"
    rationale: "'If tasks are hard, more CoT helps; if easy, more hurts' follows from ANY inverted-U model. It's not a deep result requiring our specific complexity-theoretic framework. Demoting to corollary is more honest about what's novel (the capability ceiling, not the existence of the inverted U)."
  - date: 2026-04-01
    decision: "Add S_max ≤ 1 and acknowledge decomposition as modeling assumption"
    rationale: "Expressivity ≠ capability (Kim & Suzuki ICLR 2025). Never assume perfect accuracy even for TC^0 tasks. The multiplicative accuracy decomposition is a modeling choice — acknowledging it preempts the reviewer objection and is more intellectually honest."

key_references:
  - "Wu et al. 2025 (arXiv:2502.07266) — CLOSEST PRIOR WORK. Theorem 4.2 gives optimal CoT length via abstract parameters. We must differentiate."
  - "Li et al. 2024 (arXiv:2402.12875) — T CoT steps = boolean circuits of size T. Foundation for our complexity grounding."
  - "Merrill & Sabharwal 2024 (arXiv:2310.07923) — poly(n) CoT = P. Three CoT regimes (log, linear, poly)."
  - "Amiri et al. 2025 (arXiv:2502.02393) — Lower bounds: parity needs linear CoT. First systematic lower bounds."
  - "Barcelo et al. 2025 (arXiv:2501.12997) — EH rank = exact minimum CoT steps. l-fold composition needs exactly l steps."
  - "Yeo et al. 2025 (arXiv:2502.03373) — Pro-length dispute paper. Tasks: MATH, AIME (high complexity)."
  - "Jiang et al. 2025 (arXiv:2502.12025) — SafeChain. Safety-length tradeoff. ACL 2025 Findings."

