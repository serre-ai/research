decisions_made:
  - date: 2026-03-21
    decision: "Target NeurIPS 2026 as primary venue, ICLR 2027 as fallback"
    rationale: "NeurIPS has strong ML theory track. May 6 deadline is tight but feasible. Fallback gives 5 months more."

  - date: 2026-03-21
    decision: "Scope to verification complexity of LLM outputs specifically, not general computational verification"
    rationale: "Novel contribution is the bridge between classical complexity and concrete LLM methods."

  - date: 2026-03-21
    decision: "Position as third paper in theoretical trilogy with reasoning-gaps and self-improvement-limits"
    rationale: "Cross-references strengthen all three papers."

  - date: 2026-03-21
    decision: "Scope to Theorems 1-3 for NeurIPS; defer oversight ceiling theorem to extended version"
    rationale: "6.5 weeks is tight. Three focused theorems plus empirical validation is more viable than four theorems. Oversight connection is important but can be a standalone contribution."

  - date: 2026-03-21
    decision: "Build verification complexity table on top of reasoning-gaps 6-type taxonomy"
    rationale: "Directly extends the reasoning-gaps framework, strengthens both papers, and provides concrete predictions. The taxonomy provides the task classification; this paper adds the verification dimension."

  - date: 2026-03-21
    decision: "If theorems aren't landing by April 15, pivot to ICLR 2027"
    rationale: "Better to submit a strong theory paper late than a weak one on time."

  - date: 2026-03-22
    decision: "Proactively prepare ICLR 2027 materials while pursuing NeurIPS track"
    rationale: "Linear issue DW-99 requests ICLR preparation. Enhancements made now (extended discussion, proof details, experimental design) strengthen both submissions. ICLR has 4 months more lead time, allowing for interactive verification extension (Theorem 4) and additional benchmarks if NeurIPS timeline proves too tight. All work done for ICLR prep also improves NeurIPS submission quality."

  - date: 2026-03-22
    decision: "Structure experimental section with clear TODOs rather than placeholder prose"
    rationale: "Makes it explicit what the Experimenter agent needs to deliver. Prevents accidental submission of incomplete results. For ICLR, full results with statistical analysis are non-negotiable; for NeurIPS, we can potentially submit with partial results if theorems are strong."

  - date: 2026-03-22
    decision: "Expand discussion section beyond standard limitations paragraph"
    rationale: "ICLR reviewers expect deeper reflection on scope boundaries, average-case vs worst-case gap, and connections to related problems. Extended discussion (scope boundaries, model-complexity idealization, empirical coverage, detailed future work) positions paper for top-tier venue regardless of NeurIPS vs ICLR path."

