decisions_made:
  - date: 2026-03-21
    decision: "Target NeurIPS 2026 as primary venue, ICLR 2027 as fallback"
    rationale: "NeurIPS has strong ML theory track and is the natural venue for work connecting complexity theory to LLM training. May 6 deadline is tight (6.5 weeks) but feasible for a theory paper with limited empirical validation. ICLR 2027 fallback gives ~5 additional months if scope needs expansion."
  - date: 2026-03-21
    decision: "Scope to verification complexity of LLM outputs specifically, not general computational verification"
    rationale: "A general complexity-theoretic treatment of verification would be a textbook chapter, not a conference paper. The novel contribution is connecting classical verification complexity to concrete LLM training and inference methods (RLHF, self-consistency, majority voting). This keeps the paper focused and actionable."
  - date: 2026-03-21
    decision: "Position as third paper in theoretical trilogy with reasoning-gaps and self-improvement-limits"
    rationale: "The three papers form a coherent research program: what LLMs can't reason about (reasoning-gaps), what they can't learn on their own (self-improvement-limits), and what can't be verified (verification-complexity). Cross-references strengthen all three papers and establish a unified theoretical framework."

