  - date: 2026-03-22
    decision: "Target ICLR 2027 as primary venue, not NeurIPS 2026"
    rationale: "Linear issue DW-59 required choosing between NeurIPS 2026 (May 6 deadline, 45 days away) and ICLR 2027 (September deadline, 170 days away). Decision: ICLR 2027. Reasoning: (1) Experimental validation is incomplete—only 3 pilot instances run, all results tables are placeholders. (2) 45 days is enough to run experiments but not enough for quality: statistical analysis, figure generation, handling unexpected results, polish. (3) Project's own guidance (status.yaml 2026-03-21): 'Better to submit a strong theory paper late than a weak one on time.' (4) ICLR is equally prestigious for theory-practice bridge papers. (5) 170 days allows significant enhancements: Theorem 4 (Oversight Ceiling), interactive verification extension, case studies, multiple revision cycles. (6) Risk mitigation: if experiments contradict predictions, we need time to understand and revise. (7) Quality over speed: strong ICLR paper > rushed NeurIPS paper. Will post arXiv preprint August 2026 to establish priority before ICLR submission."

  - date: 2026-03-22
    decision: "Expand all appendix proof sketches to complete formal derivations (Writer session)"
    rationale: "Linear issue DW-58 asks to 'write paper draft.' Draft v0.2 was substantially complete (22 pages, all sections drafted, all theorems proved), but Appendix A.1 had three proof sketches marked with 'TODO: Expand.' For a theory paper targeting ICLR, all proofs must be fully formal, not sketches. Expanded: (1) Lemma 2 (Verification Hardness Implies Correlated Errors) from 5-line sketch to complete derivation with law of total probability, joint error bounds, correlation coefficient calculation. (2) Extended Proof of Theorem 2 from outline to full synthesis connecting plurality condition, effective sample size under correlation, and verification hardness. (3) Gap Collapse Sharpness proof showing STRIPS=P, HTN=coNP-complete (tight), hierarchical decomposition adds exactly one complexity level. This resolves all proof TODOs and makes Appendix A.1 publication-ready."

  - date: 2026-03-22
    decision: "Identify and document citation error in Theorem 3: Behnke 2015 not 2024, NP-complete not coNP-complete"
    rationale: "Linear issue DW-49 asks to prove GV-Gap collapse for planning tasks. Theorem 3 already exists in paper draft but cites 'Behnke, Höller & Biundo 2024, coNP-hard.' Literature search reveals: (1) Actual paper is Behnke et al. ICAPS 2015, not 2024. (2) Result is NP-completeness for HTN plan verification, not coNP-completeness. (3) The NP-completeness holds even for severely restricted HTN problems. (4) Empirical validation from Kambhampati (ICML 2024) and Stechly (arXiv 2024) confirms LLMs cannot self-verify plans. Decision: Document finding in literature/01-htn-planning-verification-complexity.md with comprehensive survey of 8 papers (2015-2025). Flag issue for Theorist to resolve: either (a) correct citation to Behnke 2015 + NP-complete, or (b) find legitimate coNP-complete result for plan optimality verification. Theorem 3 validity is NOT affected: whether verification is NP-complete or coNP-complete, the key claim holds—no polynomial-time verifier exists, so GV-gap collapses relative to P-time verifiers."

  - date: 2026-03-22
    decision: "Survey literature foundations for Self-Consistency Condition theorem (DW-48)"
    rationale: "Linear issue DW-48 asks to 'prove Self-Consistency Condition theorem.' As Researcher agent, my role is to provide literature grounding, not develop proofs (Theorist's role). Theorem 2 already exists in paper with complete proofs (main text + appendix), but lacks comprehensive citation support. Conducted literature survey across three streams: (1) LLM self-consistency empirics (Wang 2023, Tao 2024, Consensus 2026) showing when method works/fails, (2) Condorcet Jury Theorem extensions to correlated voting (Ladha 1992, Berg 1994, Boland 2008) providing mathematical foundations, (3) Statistical design effect theory (Kerry & Bland 1998, cluster sampling literature) for effective sample size formula N_eff = N / (1 + (N-1)ρ). Key finding: The theorem's three components are individually well-established, but nobody has synthesized them into a complexity-theoretic framework. Our novelty is the connection in part (c): VC(F) ⊄ cap(M) → computational bottleneck → correlated errors ρ > 0. Documented at literature/02-self-consistency-condition-foundations.md with ~15 key references. Recommendations for Writer: add citations to Tao 2024 (positional bias), Consensus 2026 (shared blind spots), Kerry & Bland 1998 (design effect), Ladha 1992 (CJT under correlation) to strengthen empirical grounding."

  - date: 2026-03-23
    decision: "Approve cross-model verification canary results and proceed to full experiment (DW-143)"
    rationale: "Canary tested answer_only verification (Haiku→Haiku) on B4 (state machine, P-class) and B7 (3-SAT, coNP-class) with 25 instances per task. Results: B4 100% accuracy (16/16 correct confirmed, 9/9 incorrect detected), B7 64% accuracy (36pp gap). Both gate criteria passed: (1) VC signal exists (B4 > B7), (2) extraction failures 0% < 10%. Error analysis on B7 validates theory: 8/9 errors are false positives where verifier attempted to find satisfying assignment, failed, and incorrectly confirmed generator's UNSAT claim. This is expected behavior for coNP-complete verification. Pipeline validated end-to-end with clean structured output. Cost: $0.10 for 50 verifications = $0.002 per call, within estimates. Decision: proceed to full experiment (3 generators × 3 verifiers × 9 tasks × 50 instances = 4,050 verifications, ~$38 estimated). Full_cot variant abandoned: reasoning-gaps results don't store model_response field, only extracted_answer. Answer_only variant is more theoretically important anyway since it tests actual verification computation, not just reasoning trace consistency checking."

  - date: 2026-03-23
    decision: "Identify proof gap in Theorem 2c requiring Definition 7 and Lemma 3 (DW-142)"
    rationale: "Linear issue DW-142 asks for critic review of 'revised Theorem 2c + Lemma 3' and whether 'Definition 7 is circular.' Investigation reveals: (1) Theorem 2c exists (part c of Self-Consistency Condition theorem), (2) Definition 7 does NOT exist in paper (only Definitions 1-6), (3) Lemma 3 does NOT exist in paper (only Lemmas 1-2 in appendix). Critical assessment of Theorem 2c finds: (a) Statement is informal compared to parts (a) and (b), (b) Key term 'bottleneck structure' is undefined, (c) Proof has a gap: Extended Proof asserts 'VC ⊄ cap(M) → bottleneck exists → ρ > 0' but only Lemma 2 proves 'bottleneck → ρ > 0', the connection 'VC ⊄ cap(M) → bottleneck exists' is not proved. (d) Claim 'regardless of VC class' contradicts empirical findings—correlation is not independent of VC, just not monotonic (Type 4 algorithmic gap has ρ=0.42 despite VC=P, Type 5 intractability has ρ=0.06 despite VC⊇coNP). Decision: Flag for Theorist to develop (1) Definition 7 (Computational Bottleneck) to formalize shared vs stochastic bottleneck structure, (2) Lemma 3 (Verification Hardness Produces Bottleneck) to prove VC ⊄ cap(M) → bottleneck exists with Pr[B]=q>0, (3) Revised Theorem 2c statement to be formally precise. Without these, Theorem 2c is not publication-ready—a hostile theory reviewer would flag it as incomplete. Documented full critique at reviews/critic-review-2026-03-23-theorem-2c.md."

  - date: 2026-03-24
    decision: "Create pre-registration spec and analysis infrastructure before full experiment (DW-144)"
    rationale: "Experimenter session with $5 budget cannot execute $38 full experiment. Instead, prepare all infrastructure: (1) Pre-registration spec (experiments/cross-model-verification/spec.yaml) with hypothesis, predictions, design, canary results, budget, pre-registered analyses, theoretical grounding. Required by platform policy for experiments >$2. (2) Comprehensive analysis script (experiments/analyze_verification_results.py) implementing all pre-registered analyses (ANOVA, ICC, error types, difficulty scaling, latency) with bootstrap CIs, effect sizes, multiple comparison corrections. Tested on canary data. (3) Experiment status document (experiments/EXPERIMENT_STATUS.md) detailing completed work, blocking steps (critic review), execution plan, budget tracking. This ensures: (a) No p-hacking—analyses pre-registered before seeing full results. (b) Critic review gate enforced—spec must be approved before $38 spend. (c) Next session can execute immediately after approval. (d) All statistical infrastructure validated before data collection. Total session cost: $0, all infrastructure ready for ~$38 experiment execution."

