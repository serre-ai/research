next_steps:
  - "Define Verification Complexity Class VC(F) formally (Definition 1)"
  - "Define Generation-Verification Gap GV-Gap(F) and model-relative variant (Definitions 2-3)"
  - "Prove Verification Advantage theorem (mitigation works iff VC(F) in augmented model class)"
  - "Prove Self-Consistency Condition theorem (conditions for majority voting to work)"
  - "Prove GV-Gap Collapse for HTN planning (VC >= coNP)"
  - "Map verification complexity onto 6 gap types from reasoning-gaps taxonomy"
  - "Design empirical validation: GSM8K vs PlanBench vs SAT self-consistency experiments"

progress:
  literature_review:
    status: complete
    notes: "~60 papers surveyed across classical complexity (IP, PCP, AM), LLM verification (self-consistency, reward models, GenRM), scalable oversight (debate, W2S), and domain-specific verification (planning, code, math). Key gap identified: no unified framework connecting classical verification complexity to LLM capability hierarchy. Synthesis at literature/synthesis.md"
  formal_framework:
    status: complete
    notes: "7 definitions, 3 theorems with full proofs, taxonomy table. Draft at paper/main.tex."
  empirical_validation:
    status: not_started
    notes: "Controlled experiments on existing benchmarks (GSM8K, MATH, PlanBench, SAT). ~$100 budget. Design after theorems formalized."
  paper_writing:
    status: in_progress
    notes: "First draft complete (9 pages). Remaining: empirical results, bibliography cleanup, proof polish."

decisions_pending:
  - "Whether to include interactive verification (debate connection) or scope to single-round verification"
  - "Whether to build directly on reasoning-gaps taxonomy or develop independent framework"

decisions_made:
  - date: 2026-03-21
    decision: "Target NeurIPS 2026 as primary venue, ICLR 2027 as fallback"
    rationale: "NeurIPS has strong ML theory track. May 6 deadline is tight but feasible. Fallback gives 5 months more."
  - date: 2026-03-21
    decision: "Scope to verification complexity of LLM outputs specifically, not general computational verification"
    rationale: "Novel contribution is the bridge between classical complexity and concrete LLM methods."
  - date: 2026-03-21
    decision: "Position as third paper in theoretical trilogy with reasoning-gaps and self-improvement-limits"
    rationale: "Cross-references strengthen all three papers."
  - date: 2026-03-21
    decision: "Scope to Theorems 1-3 for NeurIPS; defer oversight ceiling theorem to extended version"
    rationale: "6.5 weeks is tight. Three focused theorems plus empirical validation is more viable than four theorems. Oversight connection is important but can be a standalone contribution."
  - date: 2026-03-21
    decision: "Build verification complexity table on top of reasoning-gaps 6-type taxonomy"
    rationale: "Directly extends the reasoning-gaps framework, strengthens both papers, and provides concrete predictions. The taxonomy provides the task classification; this paper adds the verification dimension."
  - date: 2026-03-21
    decision: "If theorems aren't landing by April 15, pivot to ICLR 2027"
    rationale: "Better to submit a strong theory paper late than a weak one on time."

