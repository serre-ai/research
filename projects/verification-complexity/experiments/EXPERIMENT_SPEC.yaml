# =============================================================================
# STATISTICAL ANALYSIS PLAN
# =============================================================================

statistical_analysis:
  # All tests pre-registered. No ad hoc analyses.
  primary_analyses:
    - name: "SC plateau detection"
      method: >
        For each task/model combination, fit a piecewise linear model:
        acc(N) = a + b*N for N <= N_break, acc(N) = c for N > N_break.
        Estimate N_break via AIC/BIC comparison across candidate breakpoints.
        The plateau is at N = N_break.
      alternative: >
        If piecewise linear is too noisy, use the simpler criterion:
        plateau_N = smallest N such that acc(2N) - acc(N) < 0.02.

    - name: "N_eff model fit"
      method: >
        For each task/model, compute theoretical accuracy curve using:
          p_hat = observed acc@1 (from N=1 data)
          delta = (2*p_hat - 1) / (2 * sqrt(p_hat * (1 - p_hat)))
          acc_theory(N) = Phi(delta * sqrt(N_eff))
          where N_eff = N / (1 + (N-1) * rho_known)

        Compute R^2 between empirical acc(N) and acc_theory(N) across
        N = {1, 3, 5, 9, 17, 33}.

        EDGE CASE: When p_hat ≈ 0.50, delta ≈ 0 and the theory predicts
        acc(N) ≈ 0.50 regardless of N. This is mathematically correct
        (majority vote can't help when the base rate is coin-flip) but
        makes the R^2 metric degenerate. For tasks where p_hat is in
        [0.45, 0.55], use difficulty-stratified analysis with p_hat
        measured per difficulty band.

        CRUCIAL: rho_known is the BETWEEN-MODEL rho from reasoning-gaps.
        It is NOT fit to this data. This is a zero-parameter prediction
        (given the measured p_hat at N=1).
      note: >
        Using between-model rho as a proxy for within-model rho is an
        approximation. If within-model rho systematically exceeds between-model
        rho (likely, per Theorem 2c.iii), the empirical curve will saturate
        FASTER than the theoretical prediction. We handle this by:
        (1) Reporting R^2 with the between-model rho (primary, zero-parameter).
        (2) Fitting rho as a free parameter (secondary, one-parameter) and
            comparing the fitted rho_within to the known rho_between. Theorem
            2c.iii predicts fitted_rho_within > rho_between.

    - name: "rho ordering test"
      method: >
        Bootstrap the within-model rho estimate for each task (resample
        instances with replacement, recompute rho, 10000 bootstrap iterations).
        Compare rho(B6) vs rho(B7) with one-sided permutation test.
        Report effect size (Cohen's d on the bootstrap distributions).

    - name: "Ensemble comparison"
      method: >
        Paired McNemar test: for each instance, compare within-model majority
        vote at N=9 vs between-model majority vote at N=9. Compute accuracy
        difference with 95% CI (Agresti-Caffo interval for paired proportions).
        Test H0: within = between vs H1: between > within, one-sided.

  secondary_analyses:
    - name: "Temperature effect on rho"
      method: >
        If the condition ablation (direct vs short_cot) is run, compare
        within-model rho under both conditions. Theory predicts rho is
        similar because the bottleneck is computational, not prompt-dependent.

    - name: "Difficulty effect on SC lift"
      method: >
        Stratify by difficulty (1-5). Does SC lift increase with difficulty?
        Theory predicts SC lift is bounded by N_eff regardless of difficulty,
        but the base accuracy p changes, so the absolute lift may vary.
        Interaction test: lift ~ difficulty * task, two-way ANOVA.

    - name: "Error type decomposition"
      method: >
        For B7 (3-SAT), decompose errors into:
          - SAT instances misclassified as UNSAT (false negative on satisfiability)
          - UNSAT instances misclassified as SAT (false positive on satisfiability)
        Theory predicts UNSAT verification is the bottleneck (coNP), so false
        positives on UNSAT instances should dominate.

  correction_for_multiple_comparisons: >
    5 primary predictions tested simultaneously. Apply Holm-Bonferroni
    correction (step-down Bonferroni) to the p-values from the 5 primary
    tests. Report both raw and corrected p-values.


# =============================================================================
# SUCCESS CRITERIA
# =============================================================================

success_criteria:
  strong_confirmation: >
    All 5 primary predictions (SC-P1 through SC-P5) confirmed at alpha=0.05
    after Holm-Bonferroni correction. R^2 > 0.85 for N_eff model fit on
    2+ primary tasks. This is an ICLR 7-8 paper.

  moderate_confirmation: >
    4 of 5 predictions confirmed. R^2 > 0.70 for N_eff model fit.
    Non-monotonicity (B6 rho > B7 rho) confirmed. This is an ICLR 6-7 paper
    with clear positive results and one nuance to discuss.

  weak_confirmation: >
    3 of 5 predictions confirmed. Non-monotonicity confirmed but R^2 < 0.70.
    The theory captures the direction but not the magnitude. Needs discussion
    of gap between theory and data. Borderline ICLR with strong theory.

  disconfirmation: >
    Non-monotonicity fails (rho(B7) >= rho(B6)) OR R^2 < 0.50 for the
    N_eff model on all tasks. The theory makes wrong predictions.
    Paper must pivot to: "here is what we predicted, here is what happened,
    here is the revised theory."


# =============================================================================
# FAILURE ANALYSIS PLAN
# =============================================================================
# What to do if predictions fail.
# =============================================================================

failure_analysis:
  # Each prediction has a specific failure mode and recovery plan.

  if_sc_p1_fails:
    symptom: "SC lift ordering doesn't match rho ordering"
    diagnosis: >
      1. Check whether base accuracy (acc@1) confounds the comparison.
         High base accuracy → less room for improvement regardless of rho.
      2. Check whether the tasks tested have sufficient error rate (>10% at N=1).
      3. Check whether within-model rho deviates substantially from between-model rho.
    recovery: >
      Normalize lift by the maximum theoretical lift (1 - acc@1). If normalized
      lift follows the rho ordering, the prediction holds after controlling for
      ceiling effects. Report both raw and normalized lift.

  if_sc_p2_fails:
    symptom: "B6 accuracy keeps improving past N=17"
    diagnosis: >
      1. Measure within-model rho directly. If rho_within < rho_between for B6,
         the shared-bottleneck prediction for within-model SC is too strong.
      2. Check whether T=1.0 introduces enough diversity to partially circumvent
         the shared bottleneck (temperature-induced stochasticity).
    recovery: >
      Report the measured rho_within and compare to rho_between. If rho_within
      is lower but still tracks the ordering, the qualitative prediction holds
      with a quantitative correction.

  if_sc_p4_fails:
    symptom: "N_eff model has R^2 < 0.50"
    diagnosis: >
      1. The Gaussian approximation (Phi function) may be poor for small N.
      2. The equicorrelated model (constant rho across all pairs) may be
         too simplistic — rho may vary across instances.
      3. The between-model rho may be a poor proxy for within-model rho.
    recovery: >
      Fit a two-parameter model: rho and p as free parameters. If R^2 improves
      dramatically, report the fitted rho and compare to between-model rho.
      This weakens the prediction from "zero-parameter" to "one-parameter" but
      may still be informative.

  if_nonmonotonicity_fails:
    symptom: "rho(B7) >= rho(B6)"
    diagnosis: >
      This is the most damaging failure. It means the bottleneck-type
      distinction (shared vs stochastic) does not predict error correlation.
      Check:
      1. Is B6 accuracy so low (~20%) that errors are near-random? Near-random
         errors have rho → 0 regardless of bottleneck type.
      2. Does B7 show unexpectedly high within-model correlation due to
         consistent heuristic failures (not stochastic)?
    recovery: >
      If B6 accuracy is very low for some models, restrict the comparison to
      models where both B6 and B7 accuracy is in the 30-70% range. If the
      non-monotonicity holds conditionally, report it as such. If it fails
      completely, weaken the claim to: "bottleneck type influences error
      correlation, but within-model effects dominate the between-model signal."

  if_ensemble_gap_fails:
    symptom: "Between-model doesn't outperform within-model on shared tasks"
    diagnosis: >
      1. The between-model ensemble uses models of varying quality. If the
         weakest model is much worse, its votes hurt the ensemble.
      2. The matching isn't perfectly fair: within uses 9 samples from the
         same model; between uses 9 different models with different baselines.
    recovery: >
      Normalize by matching base accuracy: only include models whose individual
      accuracy is within 10pp of the within-model's accuracy. This controls
      for quality while preserving diversity.


# =============================================================================
# PRE-REGISTRATION SUMMARY
# =============================================================================
# These predictions are committed BEFORE seeing results.
# =============================================================================

pre_registration:
  date: "2026-03-31"
  committed_predictions:
    - "SC-P1: SC lift follows inverse rho ordering (B7 > B4 > B6)"
    - "SC-P2: B6 accuracy plateaus by N=17 (within 2pp of N=33)"
    - "SC-P3: B7 accuracy at N=33 exceeds N=9 by ≥2pp"
    - "SC-P4: N_eff theoretical curve fits empirical data with R^2 > 0.85"
    - "SC-P5: Within-model rho > 0.5 for all tasks"
    - "CORR-P3: rho(B6) > rho(B7) (non-monotonicity)"
    - "ENS-P1: Between-model > within-model by ≥5pp on B6 at N=9"
    - "ENS-P2: gap(B6) > gap(B7) for ensemble comparison"

  constitutes_confirmation: >
    6 of 8 predictions confirmed at alpha=0.05 after Holm-Bonferroni correction,
    including at least CORR-P3 (non-monotonicity) and SC-P4 (N_eff fit).

  constitutes_disconfirmation: >
    Both CORR-P3 and SC-P4 fail. The theory makes wrong predictions about
    both the ordering of error correlations and the shape of scaling curves.

  what_if_disconfirmed: >
    1. Report all results honestly, including failures.
    2. Analyze WHY the predictions failed — the failure mode is informative.
    3. If the ordering is wrong but the magnitude is right, or vice versa,
       report the partial success.
    4. If everything fails, pivot the paper to: "the bottleneck framework
       identifies the right QUALITATIVE distinction (shared vs stochastic)
       but the QUANTITATIVE predictions require a more refined model."
    5. In the worst case, the paper's theoretical contributions (Theorems 1-3)
       stand on their own — the empirical section becomes "preliminary
       evidence with important caveats."


