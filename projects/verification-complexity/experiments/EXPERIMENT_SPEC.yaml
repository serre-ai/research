# =============================================================================
# COMPREHENSIVE EXPERIMENT SPECIFICATION
# The Computational Complexity of Verifying LLM Outputs
# =============================================================================
#
# This document specifies the complete experiment suite for an ICLR 2027
# submission. Each experiment maps directly to a theorem or prediction in the
# paper. The suite is designed so that the full collection of results constitutes
# an airtight empirical case: if the predictions hold, the paper is compelling;
# if they fail in specific ways, we know exactly what went wrong and can revise
# the theory.
#
# Design philosophy:
#   1. Every experiment tests a SPECIFIC, FALSIFIABLE prediction from the paper.
#   2. Predictions are committed BEFORE seeing results (pre-registration).
#   3. The analysis plan is fully specified — no degrees of freedom.
#   4. Budget-aware: fits within $40/day, ~$200 total.
#   5. The "money figure" is the SC scaling curve (Experiment 1), not
#      cross-model verification (Experiment 4).
#
# Author: Oddur Sigurdsson + Claude
# Date: 2026-03-31
# Status: draft (awaiting review)
# =============================================================================

meta:
  paper_title: "On the Verification Complexity of LLM Outputs: When Checking is as Hard as Generating"
  target_venue: "ICLR 2027"
  target_deadline: "~2026-09-25"
  total_budget_usd: 200
  daily_budget_usd: 40
  pre_registration_date: "2026-03-31"
  version: "1.0"


# =============================================================================
# EXPERIMENT 1: Self-Consistency Scaling Curves
# =============================================================================
# THE MONEY EXPERIMENT. Tests Theorem 2c directly.
#
# The paper's central empirical prediction: accuracy under majority voting
# follows acc(N) = f(N_eff), where N_eff = N / (1 + (N-1)*rho). High-rho
# tasks plateau early. Low-rho tasks keep improving.
#
# This is the figure that will be cited for years: accuracy vs N, with the
# theoretical N_eff prediction overlaid, showing that the theory predicts
# the plateau location.
# =============================================================================

experiment_1:
  name: "Self-Consistency Scaling Curves"
  short_name: "sc_scaling"
  theorems_tested:
    - "Theorem 2c (Self-Consistency Condition)"
    - "Theorem 2c.i (Shared bottleneck → bounded N_eff)"
    - "Theorem 2c.iii (Within-model dominance)"
    - "Remark 1 (Non-monotonicity)"
  status: "planned"

  # ---------------------------------------------------------------------------
  # Rationale
  # ---------------------------------------------------------------------------
  rationale: >
    The paper's main technical contribution is the bottleneck-dependent error
    correlation model. The most direct test is: does accuracy under majority
    voting saturate at the N_eff predicted by measured rho? If we observe that
    B6 (rho=0.42) plateaus at N_eff ~ 2.4 while B7 (rho=0.06) keeps improving
    well past N=16, the theory is vindicated. The key insight is that the
    PLATEAU LOCATION, not just its existence, is predicted by the theory.

  # ---------------------------------------------------------------------------
  # Critical lesson from pilot data
  # ---------------------------------------------------------------------------
  pilot_findings: >
    CRITICAL: Pilot SC data at T=0.7 showed 96-99% within-sample agreement
    across all tasks (B2, B4, B7, B9 at N=9). At T=1.0, B4 at difficulty=4
    showed ~89% agreement — still high but with detectable diversity. This means
    within-model SC at moderate temperatures is NEARLY DETERMINISTIC for Haiku.

    This is actually CONSISTENT with Theorem 2c.iii: within-model sampling
    always falls in the shared-bottleneck regime. The pilot data CONFIRMS the
    prediction rather than undermining it. But it means we need:
    (a) Temperature = 1.0 (maximum non-degenerate diversity)
    (b) Focus on tasks where base accuracy is 30-70% (not >90% where there's
        nothing to correct)
    (c) Multiple models, not just Haiku, to show the pattern is universal
    (d) Enough N values to see the early-plateau clearly

    The STORY is: "within-model SC doesn't help much because rho_within is
    always high, but the DEGREE of futility varies by bottleneck type, and
    that variation matches the theory."

  # ---------------------------------------------------------------------------
  # Design
  # ---------------------------------------------------------------------------
  design:
    # --- Models ---
    # Three models spanning capability levels. Each model does within-model SC.
    # We need models where base accuracy is in the 30-70% range on the hard
    # tasks — too high and there's no room for SC to help; too low and majority
    # voting can't overcome the base rate.
    #
    # Based on existing data:
    #   B6 (LIS): Haiku 50%, GPT-4o-mini 31%, Llama-8B 19%
    #   B7 (3SAT): Haiku 70%, GPT-4o-mini 60%, Llama-8B 26%
    #   B4 (FSM):  Haiku 89%, GPT-4o-mini 64%, Llama-8B 61%
    #
    # Haiku is best: it has accuracy in the critical range for B6 and B7.
    # GPT-4o-mini gives a second model with accuracy in range for B4, B6, B7.
    # Llama-8B is too weak on B6 (19%) — majority voting from a near-random
    # base is theoretically interesting but not the primary test.
    models:
      primary:
        - key: "haiku"
          model_id: "claude-haiku-4-5-20251001"
          provider: "anthropic"
          cost_per_call_usd: 0.002
          rationale: "Best accuracy profile across tasks. 50% on B6 is ideal for SC testing."
      secondary:
        - key: "gpt4o-mini"
          model_id: "gpt-4o-mini"
          provider: "openai"
          cost_per_call_usd: 0.002
          rationale: "Independent architecture, accuracy in range for B4/B6/B7."
      tertiary:
        - key: "llama-8b"
          model_id: "meta-llama/llama-3.1-8b-instruct"
          provider: "openrouter"
          cost_per_call_usd: 0.0005
          rationale: "Third architecture family. Low B6 accuracy is a boundary case."

    # --- Sample counts (N values) ---
    # Need enough points to see the curve shape clearly. The theoretical
    # prediction is exponential convergence at rate exp(-Omega(N_eff)), so:
    # - For high-rho (rho=0.42): N_eff maxes out at ~2.4 regardless of N.
    #   Plateau should be visible by N=5-9.
    # - For low-rho (rho=0.06): N_eff ~ N/1.05, so improvement continues.
    #   Need N up to 32+ to see continued improvement.
    #
    # We use N = {1, 3, 5, 9, 17, 33} — geometric-ish progression that
    # gives 6 points on the curve. N=1 is the baseline (no voting).
    # N=33 (odd) ensures a clean majority with no ties.
    #
    # IMPORTANT: We don't need to re-run N=1 separately — it's the first
    # sample from each N>1 run. But for clean methodology we compute N=1
    # accuracy from the dedicated single-sample evaluation (existing data).
    sample_counts: [1, 3, 5, 9, 17, 33]

    # --- Temperature ---
    # T=1.0: maximum diversity without degeneration. Pilot showed T=0.7 gives
    # 96-99% agreement (useless). T=1.0 gives ~89% agreement on easy tasks
    # and more diversity on hard tasks. Higher T risks degenerate outputs.
    # We use T=1.0 for all within-model SC experiments.
    temperature: 1.0

    # --- Tasks ---
    # Focus on the THREE tasks that most cleanly test the theory:
    #   B6 (LIS): shared bottleneck, rho=0.42, VC=P. HIGHEST predicted rho.
    #             SC should show EARLY plateau.
    #   B7 (3SAT): stochastic bottleneck, rho=0.06, VC=P/coNP. LOWEST rho.
    #              SC should show CONTINUED improvement (if base acc allows).
    #   B4 (FSM): moderate bottleneck, rho=0.22, VC=P. MIDDLE rho.
    #             SC should show intermediate plateau.
    #
    # We also run B1, B2, B3, B5 for completeness (smaller scale) and B8, B9
    # for the architectural bottleneck baseline.
    tasks:
      primary:
        - task: "B6"
          label: "LIS (algorithmic, shared bottleneck)"
          known_rho: 0.42
          predicted_neff_limit: 2.4  # 1 / rho
          predicted_plateau_n: 5     # N where acc improvement < 1%
          rationale: "Shared bottleneck exemplar. All models lack DP for LIS."
          accuracy_note: >
            CRITICAL EDGE CASE: Haiku has 50% aggregate accuracy on B6, but
            this is bimodal: 97% at d=1, 95% at d=2, 52% at d=3, 6% at d=4,
            0% at d=5. The SC scaling test is only meaningful where accuracy
            is in the 25-75% range (d=2-3 for Haiku).

            ANALYSIS STRATEGY: Stratify by difficulty. Use d=1-3 (where Haiku
            has 52-97% accuracy) as the primary analysis. At d=3 (52%), the
            shared-bottleneck prediction is that ALL 33 samples will agree on
            the SAME wrong answer — SC cannot help. This is actually the most
            dramatic demonstration of the shared bottleneck: near-coin-flip
            accuracy with near-perfect agreement.

            For the scaling curve in Figure 1, use difficulty-stratified panels
            or report aggregate accuracy weighted to the 25-75% accuracy band.

        - task: "B7"
          label: "3-SAT (intractability, stochastic bottleneck)"
          known_rho: 0.06
          predicted_neff_limit: 16.7  # 1 / rho
          predicted_plateau_n: 33     # Continues improving at N=33
          rationale: "Stochastic bottleneck exemplar. Instance-specific hardness."

        - task: "B4"
          label: "FSM (serial, moderate bottleneck)"
          known_rho: 0.22
          predicted_neff_limit: 4.5
          predicted_plateau_n: 9
          rationale: "Intermediate case. Tests the rho-plateau relationship."

      secondary:
        - task: "B1"
          known_rho: 0.22
        - task: "B2"
          known_rho: 0.22
        - task: "B3"
          known_rho: 0.31
        - task: "B5"
          known_rho: 0.11

      tertiary:
        - task: "B8"
          known_rho: 0.15
          rationale: "Architectural bottleneck. Prediction unclear."
        - task: "B9"
          known_rho: 0.07
          rationale: "Architectural bottleneck. Prediction unclear."

    # --- Instances ---
    # Power analysis for detecting a 5-percentage-point accuracy difference
    # between N=1 and N=33:
    #   alpha = 0.05, power = 0.80, effect = 0.05 on proportion test
    #   Required n ~ 750 per condition (McNemar's test on paired data)
    #
    # But we're doing paired comparisons (same instances at different N),
    # which dramatically reduces the required n. For paired data with
    # moderate correlation:
    #   Required n ~ 200 per condition for paired McNemar
    #
    # We use 40 instances per difficulty x 5 difficulties = 200 per task.
    # For primary tasks (B4, B6, B7): 200 instances each.
    # For secondary tasks (B1-B3, B5): 100 instances each (20/difficulty).
    # For tertiary tasks (B8, B9): 100 instances each.
    instances:
      primary_tasks:
        instances_per_difficulty: 40
        difficulties: [1, 2, 3, 4, 5]
        total_per_task: 200
      secondary_tasks:
        instances_per_difficulty: 20
        difficulties: [1, 2, 3, 4, 5]
        total_per_task: 100
      tertiary_tasks:
        instances_per_difficulty: 20
        difficulties: [1, 2, 3, 4, 5]
        total_per_task: 100

    # --- Condition ---
    # short_cot: "Think step by step, then provide your final answer."
    # This is the standard SC condition — it's what Wang et al. (2023) used.
    # We also run a small comparison with "direct" (answer-only) on primary
    # tasks to verify that CoT is necessary for the SC effect.
    condition: "short_cot"
    condition_ablation: "direct"  # Primary tasks only, N={1,9} only

    # --- Reproducibility ---
    seed: 42

  # ---------------------------------------------------------------------------
  # Predictions (pre-registered, falsifiable)
  # ---------------------------------------------------------------------------
  predictions:
    # P1: The ordering of plateau rates matches the ordering of rho
    - id: "SC-P1"
      statement: >
        The self-consistency lift (accuracy_N33 - accuracy_N1) follows the
        inverse rho ordering: lift(B7) > lift(B4) > lift(B6), for at least
        2 of 3 models tested.
      falsification: >
        If lift(B6) > lift(B7) for 2+ models, the rho-ordering prediction fails.
      statistical_test: >
        Paired McNemar test on accuracy at N=1 vs N=33 for each task/model.
        Compare lift magnitudes. One-sided test: lift(B7) > lift(B6).

    # P2: B6 accuracy plateaus early
    - id: "SC-P2"
      statement: >
        For B6 (LIS), accuracy at N=17 is within 2 percentage points of
        accuracy at N=33, for the primary model (Haiku). The curve flattens
        by N~5-9.
      falsification: >
        If accuracy at N=33 exceeds accuracy at N=17 by >2pp, the plateau
        prediction fails.

    # P3: B7 accuracy keeps improving
    - id: "SC-P3"
      statement: >
        For B7 (3-SAT), accuracy at N=33 exceeds accuracy at N=9 by at
        least 2 percentage points, for the primary model (Haiku).
      falsification: >
        If accuracy plateaus by N=9, the stochastic-bottleneck prediction fails.
      note: >
        This prediction is conditional on Haiku's base accuracy being
        in the 50-75% range. If base accuracy is >85% or <25%, the test
        is underpowered.

    # P4: Theoretical N_eff curve fits empirical data
    - id: "SC-P4"
      statement: >
        The theoretical model acc(N) = Phi(sqrt(N_eff) * (2*p-1) / (2*sqrt(p*(1-p))))
        where N_eff = N/(1+(N-1)*rho) and p is the single-sample accuracy,
        fits the empirical scaling curve with R^2 > 0.85 when rho is set
        to the known between-model value.
      falsification: >
        R^2 < 0.50 for 2+ tasks indicates the N_eff model is inadequate.
      note: >
        This is the strongest test. The known rho values (from reasoning-gaps
        between-model correlation) are used WITHOUT fitting — they are EXTERNAL
        parameters plugged into the theoretical curve.

    # P5: Within-model rho is uniformly high
    - id: "SC-P5"
      statement: >
        Within-model error correlation (estimated from pairwise agreement of
        N=33 samples on the same instance) exceeds 0.5 for all tasks and all
        models.
      falsification: >
        If any task shows within-model rho < 0.3, the within-model dominance
        prediction (Theorem 2c.iii) is violated.

  # ---------------------------------------------------------------------------
  # Cost estimate
  # ---------------------------------------------------------------------------
  cost:
    # Primary model (Haiku): 3 primary tasks x 200 inst x 33 samples = 19,800 calls
    # + 4 secondary tasks x 100 inst x 33 = 13,200
    # + 2 tertiary tasks x 100 inst x 33 = 6,600
    # + condition ablation: 3 tasks x 200 inst x 9 = 5,400
    # Total Haiku: 45,000 calls x $0.002 = $90
    #
    # Secondary model (GPT-4o-mini): 3 primary tasks x 200 inst x 33 = 19,800
    # Total GPT-4o-mini: 19,800 calls x $0.002 = $39.60
    #
    # Tertiary model (Llama-8B): 3 primary tasks x 200 inst x 33 = 19,800
    # Total Llama-8B: 19,800 calls x $0.0005 = $9.90
    #
    # Grand total: ~$140
    # WITH CONTINGENCY (20%): ~$168
    #
    # PHASED EXECUTION (to manage daily budget):
    #   Day 1: Haiku primary tasks (19,800 calls, ~$40)
    #   Day 2: Haiku secondary+tertiary (19,800 calls, ~$40)
    #   Day 3: GPT-4o-mini primary (19,800 calls, ~$40)
    #   Day 4: Llama-8B primary + Haiku ablation (25,200 calls, ~$15)
    #
    breakdown:
      haiku_primary:
        calls: 19800
        cost_usd: 39.60
        runtime_hours: 6
      haiku_secondary_tertiary:
        calls: 19800
        cost_usd: 39.60
        runtime_hours: 6
      gpt4o_mini_primary:
        calls: 19800
        cost_usd: 39.60
        runtime_hours: 6
      llama_8b_primary:
        calls: 19800
        cost_usd: 9.90
        runtime_hours: 4
      haiku_ablation:
        calls: 5400
        cost_usd: 10.80
        runtime_hours: 2
    total_calls: 84600
    total_cost_usd: 139.50
    contingency_usd: 28.00
    max_budget_usd: 168.00
    estimated_runtime_days: 4


# =============================================================================
# EXPERIMENT 2: Direct Error Correlation Measurement
# =============================================================================
# This experiment directly measures rho (error correlation) from the SC data
# collected in Experiment 1. It is NOT a separate data-collection experiment
# but an analysis of Experiment 1 data. We specify it separately because it
# tests different predictions and requires specific statistical methods.
# =============================================================================

experiment_2:
  name: "Direct Error Correlation Measurement"
  short_name: "error_correlation"
  theorems_tested:
    - "Theorem 2c.i (Shared bottleneck → high rho)"
    - "Theorem 2c.ii (Stochastic bottleneck → low between-model rho)"
    - "Remark 1 (Non-monotonicity: rho not monotone in VC class)"
  status: "planned"
  data_source: "Reuses Experiment 1 data — no additional API calls"

  rationale: >
    The paper claims rho varies by bottleneck type, not VC class. The most
    direct test is to MEASURE rho from the N=33 samples per instance and
    compare across tasks. The non-monotonicity prediction (B6 rho > B7 rho)
    is the central falsifiable claim.

  # ---------------------------------------------------------------------------
  # Method: How to compute rho from N samples per instance
  # ---------------------------------------------------------------------------
  method:
    within_model_rho:
      description: >
        For each instance i, we have N=33 binary samples (correct/incorrect).
        The within-model pairwise error correlation is:
          rho_within = Corr(1[y_j incorrect], 1[y_k incorrect])
        averaged over all j!=k pairs within the same instance, then averaged
        across instances.

        Formally: for instance i with N samples, compute
          p_i = fraction of samples correct
          Then rho_i = (p_i(1-p_i) - sigma_i^2) / (p_i(1-p_i))
        where sigma_i^2 is the Bernoulli variance N*p_i*(1-p_i)/N.

        But this is ill-conditioned for p_i near 0 or 1. Better approach:
        compute the intraclass correlation (ICC) across instances.

      practical_computation: >
        1. For each instance, compute the error indicator vector e_i = (e_i1, ..., e_iN)
           where e_ij = 1 if sample j is incorrect.
        2. Compute p_hat_i = mean(e_i) for each instance.
        3. Exclude instances where p_hat_i = 0 or p_hat_i = 1 (all correct or
           all incorrect — these are uninformative for correlation).
        4. Among remaining instances, compute the average pairwise phi coefficient
           between samples within each instance, then average across instances.
        5. The population-level rho is estimated via ICC(2,1) treating samples as
           "raters" and instances as "subjects".

      samples_needed: >
        With N=33 samples per instance and 200 instances, we have ~200 instances
        contributing to the correlation estimate. For detecting rho=0.1 vs rho=0.4
        with alpha=0.05 and power=0.80, we need ~40 instances (Shrout & Fleiss, 1979).
        200 instances gives comfortable power even for the smallest predicted rho.

    between_model_rho:
      description: >
        Use the EXISTING between-model rho values from the reasoning-gaps
        evaluation (Table in paper). These were measured from 12 models x 500
        instances per task and are our ground truth. We do NOT re-measure
        between-model rho here — we use it as an EXTERNAL parameter to test
        whether it predicts within-model SC behavior.

  # ---------------------------------------------------------------------------
  # Predictions
  # ---------------------------------------------------------------------------
  predictions:
    - id: "CORR-P1"
      statement: >
        Within-model rho_within is > 0.50 for ALL tasks and models.
        This confirms Theorem 2c.iii (within-model dominance).
      falsification: >
        Any task with rho_within < 0.30 disconfirms Theorem 2c.iii.

    - id: "CORR-P2"
      statement: >
        Within-model rho_within varies by task in the same ORDERING as
        between-model rho_between: rho_within(B6) > rho_within(B4) > rho_within(B7).
        The shared-bottleneck structure is so strong that it dominates even
        within-model sampling diversity.
      falsification: >
        If ordering is random (no correlation between rho_within and rho_between
        across tasks), the bottleneck structure theory adds nothing.

    - id: "CORR-P3"
      statement: >
        Non-monotonicity: rho(B6) > rho(B7) despite VC(B6) = P (easier) and
        VC(B7) ⊇ coNP (harder). This is the paper's most distinctive prediction.
      statistical_test: >
        Permutation test on rho(B6) vs rho(B7). Compute rho for each task,
        then test H0: rho(B6) <= rho(B7) vs H1: rho(B6) > rho(B7).
        One-sided alpha = 0.05.
      falsification: >
        If rho(B7) >= rho(B6), the non-monotonicity prediction fails.

  cost:
    additional_api_calls: 0
    note: "Pure analysis of Experiment 1 data"


# =============================================================================
# EXPERIMENT 3: Within-Model vs Between-Model Ensembles
# =============================================================================
# Tests Theorem 2c.iii: within-model SC falls in the shared-bottleneck regime
# (same weights → same errors). Between-model ensembles should dominate for
# shared-bottleneck tasks.
# =============================================================================

experiment_3:
  name: "Within-Model vs Between-Model Ensemble Comparison"
  short_name: "ensemble_comparison"
  theorems_tested:
    - "Theorem 2c.iii (Within-model dominance of shared bottleneck)"
    - "Corollary (Between-model ensembles better for shared bottleneck tasks)"
  status: "planned"

  rationale: >
    The sharpest test of Theorem 2c.iii is a HEAD-TO-HEAD comparison: N samples
    from one model (within) vs 1 sample from each of N models (between). The
    theory predicts between-model should dominate on shared-bottleneck tasks
    (B6) and the gap should be smaller on stochastic-bottleneck tasks (B7).

    This requires generation from multiple models on the SAME instances, which
    we already have from the reasoning-gaps evaluation (12 models x 500 instances).

  design:
    # --- Within-model ensemble ---
    # From Experiment 1: N samples from Haiku at T=1.0
    within_model:
      source: "Experiment 1 (Haiku, T=1.0)"
      ensemble_sizes: [3, 5, 9]

    # --- Between-model ensemble ---
    # From reasoning-gaps evaluation: 1 sample per model from short_cot condition.
    # Available models with complete B1-B9 results:
    #   1. claude-haiku-4-5-20251001 (Anthropic)
    #   2. claude-sonnet-4-20250514 (Anthropic)
    #   3. claude-opus-4-6 (Anthropic)
    #   4. gpt-4o-mini (OpenAI)
    #   5. gpt-4o (OpenAI)
    #   6. o3 (OpenAI)
    #   7. llama-3.1-8b-instruct (Meta)
    #   8. mistral-small-24b (Mistral)
    #   9. ministral-8b (Mistral)
    #   10. qwen-2.5-7b (Qwen)
    #   11. qwen-2.5-72b (Qwen)
    #
    # For between-model ensemble of size N, we sample N models and take majority
    # vote of their single-sample answers on each instance.
    between_model:
      source: "reasoning-gaps evaluation (short_cot, existing data)"
      available_models: 11  # All models with complete B1-B9 results
      ensemble_sizes: [3, 5, 9]
      sampling_method: >
        For each ensemble size N, enumerate all (11 choose N) subsets of models
        (if small enough) or sample 100 random subsets. For each subset, compute
        majority vote accuracy on all shared instances. Report mean accuracy
        across subsets.
      note: "No additional API calls needed — uses existing evaluation data."

    tasks:
      - task: "B6"
        rationale: "Shared bottleneck. Between-model should dominate."
      - task: "B7"
        rationale: "Stochastic bottleneck. Gap should be smaller."
      - task: "B4"
        rationale: "Moderate bottleneck. Intermediate prediction."
      - task: "B1"
        rationale: "Working memory bottleneck. Control task."

    instances:
      # Use all 500 instances per task from reasoning-gaps evaluation.
      # Between-model data exists for all 500; within-model (Exp 1) has 200.
      # Comparison uses the 200-instance overlap.
      shared_instances: 200
      between_model_full: 500

  predictions:
    - id: "ENS-P1"
      statement: >
        On B6 (shared bottleneck): between-model ensemble at N=9 outperforms
        within-model SC at N=9 by at least 5 percentage points.
      falsification: >
        If within-model matches or exceeds between-model on B6, the
        shared-bottleneck theory for within-model is wrong.

    - id: "ENS-P2"
      statement: >
        On B7 (stochastic bottleneck): the gap between between-model and
        within-model ensembles at N=9 is smaller than on B6. Specifically,
        gap(B6) > gap(B7).
      falsification: >
        If gap(B7) >= gap(B6), the bottleneck-type distinction fails.

    - id: "ENS-P3"
      statement: >
        The between-model accuracy advantage tracks the known rho values:
        tasks with higher rho (more shared bottleneck) show larger
        between-model advantage.
      statistical_test: >
        Spearman correlation between known rho and (between_acc - within_acc).
        Expected: positive and significant (r_s > 0.5, p < 0.05).

  cost:
    additional_api_calls: 0
    note: >
      Between-model data is entirely from existing reasoning-gaps evaluation.
      Within-model data is from Experiment 1. This experiment is pure analysis.


# =============================================================================
# EXPERIMENT 4: Cross-Model Verification (Existing, Refined)
# =============================================================================
# Tests Theorem 1 (Verification Advantage). Reframed as supporting evidence.
# Already has a canary run (B4=100%, B7=64%). Full execution pending.
# =============================================================================

experiment_4:
  name: "Cross-Model Verification"
  short_name: "cross_verification"
  theorems_tested:
    - "Theorem 1 (Verification Advantage)"
  status: "canary_complete"
  spec_file: "cross-model-verification/spec.yaml"

  rationale: >
    This is the SIMPLEST experiment — does verification accuracy track VC class?
    The canary (B4=100%, B7=64%) already shows the signal. The full run adds
    all 9 tasks and 3 generator x 3 verifier pairs. It is supporting evidence
    for Theorem 1, not the main event.

  # Design is fully specified in spec.yaml. Key parameters:
  design_summary:
    generators: ["haiku", "gpt4o", "llama70b"]
    verifiers: ["haiku", "sonnet", "gpt4o-mini"]
    tasks: ["B1", "B2", "B3", "B4", "B5", "B6", "B7", "B8", "B9"]
    instances_per_difficulty: 10
    difficulties: [1, 2, 3, 4, 5]
    condition: "answer_only"
    total_instances: 4050

