# =============================================================================
# ANALYSIS PLAN: The 5 Key Figures
# =============================================================================
# These figures tell the paper's empirical story. They should be interpretable
# without reading the text.
# =============================================================================

figures:
  - id: "fig1"
    title: "Self-Consistency Scaling Curves with Theoretical Predictions"
    location: "Section 5, Main Results"
    type: "line_plot_with_theory_overlay"
    description: >
      THE MONEY FIGURE. 3x3 panel grid.

      Rows: B4 (moderate rho), B6 (high rho), B7 (low rho).
      Columns: Haiku, GPT-4o-mini, Llama-8B.

      Each panel: X-axis = N (sample count), Y-axis = accuracy (0-1).

      Two curves per panel:
        1. SOLID LINE: Empirical accuracy at N = {1, 3, 5, 9, 17, 33}
           with 95% CI error bars (bootstrap, n=1000).
        2. DASHED LINE: Theoretical prediction from N_eff model:
           acc_theory(N) = Phi(sqrt(N_eff) * z_1)
           where N_eff = N / (1 + (N-1)*rho), rho is the KNOWN between-model
           value (not fit to this data), and z_1 = Phi^{-1}(acc_N1) is set
           from the observed N=1 accuracy. Phi is the normal CDF.

      KEY VISUAL: B6 panels show early plateau (solid and dashed align, both
      flat by N~5). B7 panels show continued improvement (solid and dashed
      both keep rising). B4 is intermediate.

      ANNOTATION: In each panel, print "rho = X.XX (external)" and
      "R^2 = Y.YY" showing the fit quality.

    mockup_details: >
      Size: Full width (textwidth), ~5.5 inches wide x 5 inches tall.
      3 rows x 3 columns of subplots sharing Y-axis scale.
      Color: solid line in model-specific color (blue/orange/green),
      dashed line in gray.
      Shading: light gray band for 95% CI around empirical curve.
      Bottom row (B7) should visually show an upward trend at N=33;
      middle row (B6) should be visually flat.

  - id: "fig2"
    title: "Error Correlation by Task: Non-Monotonicity of rho vs VC Class"
    location: "Section 5, Error Correlation Results"
    type: "grouped_bar_with_annotations"
    description: >
      Bar chart showing measured within-model rho for each task (B1-B9),
      grouped/colored by VC class (P=blue, P/coNP=vermillion, Arch=purple).

      OVERLAY: horizontal markers showing the KNOWN between-model rho values
      (from reasoning-gaps) for comparison.

      KEY VISUAL: B6 (P-class, blue bar) is the TALLEST bar. B7 (P/coNP,
      vermillion bar) is one of the SHORTEST. This visually demonstrates
      non-monotonicity: easier verification class has HIGHER error correlation.

      ANNOTATION: Brace/arrow connecting B6 and B7 with label
      "rho(B6) > rho(B7), p < 0.05" (if confirmed).

  - id: "fig3"
    title: "Within-Model vs Between-Model Ensemble Accuracy"
    location: "Section 5, Ensemble Comparison"
    type: "paired_bar_chart"
    description: >
      For each primary task (B4, B6, B7), show two bars side by side:
        - Within-model SC accuracy at N=9 (from Experiment 1)
        - Between-model ensemble accuracy at N=9 (from Experiment 3)

      KEY VISUAL: On B6, the between-model bar is substantially taller.
      On B7, the two bars are similar. The GAP between bars varies by
      task in a way that matches the bottleneck type prediction.

      ANNOTATION: Delta labels on top showing the accuracy difference.

  - id: "fig4"
    title: "Verification Accuracy by Task and VC Class"
    location: "Section 5, Verification Advantage"
    type: "bar_chart_with_ci"
    description: >
      Existing Figure 1 from the analysis script. Verification accuracy for
      each task (B1-B9), colored by VC class. Tests Theorem 1.
      This is supporting evidence, not the central figure.

  - id: "fig5"
    title: "Theoretical N_eff Prediction vs Empirical Plateau Location"
    location: "Section 5, Quantitative Fit"
    type: "scatter_plot"
    description: >
      X-axis: predicted N_eff limit (= 1/rho, from known rho values).
      Y-axis: empirical plateau location (N at which accuracy improvement
      drops below 1% per doubling of N, estimated from Experiment 1).

      One point per task. If the theory is correct, points should fall
      near the identity line (y = x), possibly with a scaling factor.

      ANNOTATION: R^2 and regression line. Labels for each task.

      This is the QUANTITATIVE test: does the theory predict not just
      the ordering of plateaus, but their actual location?


