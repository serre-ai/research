# Experiment Pre-Registration Spec
# Cross-Model Verification: Testing Theorems 1 & 2 (Verification Advantage + Self-Consistency)

# Human-readable name for this experiment
name: "Cross-Model Verification: VC Signal Across Task Taxonomy"

# Current lifecycle status
# draft -> reviewed -> approved -> running -> complete | failed
status: approved

# What this experiment tests — a falsifiable statement
hypothesis: >
  Theorem 1 (Verification Advantage) predicts that verification accuracy
  correlates with a task's verification complexity class. Specifically:
  (1) Tasks with P-class verification should achieve >90% verification accuracy,
  (2) Tasks with coNP-class verification should show significantly lower accuracy,
  (3) This pattern should hold across multiple generator-verifier model pairs,
  demonstrating that the verification complexity bottleneck is architectural,
  not model-specific.
  Additionally, Theorem 2c (Self-Consistency via Bottleneck Structure) predicts
  that between-model error correlation tracks bottleneck type (shared vs stochastic),
  not VC class. This experiment provides between-model verification agreement data
  to test non-monotonicity (Remark 1): B6 (P-class, shared bottleneck, rho=0.42)
  may show higher between-model agreement than B7 (coNP, stochastic, rho=0.06).

# Measurable predictions that follow from the hypothesis
# Each prediction should specify direction and expected magnitude
predictions:
  - tasks: ["B1", "B2", "B3", "B4", "B5", "B6"]
    metric: "verification_accuracy"
    direction: "positive"
    min_effect: 0.85
    max_effect: null
    rationale: "P-class verification tasks should achieve high (>85%) accuracy across all model pairs"

  - tasks: ["B7"]
    metric: "verification_accuracy"
    direction: "positive"
    min_effect: 0.50
    max_effect: 0.80
    rationale: "3-SAT (P/coNP class) should show moderate accuracy, higher than pure coNP but lower than P"

  - tasks: ["B8"]
    metric: "verification_accuracy"
    direction: "positive"
    min_effect: 0.90
    max_effect: null
    rationale: "B8 (reversal) verification is a simple lookup: check if the stated fact appears in context. This is P-class despite the task being architecturally hard for generation. Verification should be trivially easy."

  - tasks: ["B9"]
    metric: "verification_accuracy"
    direction: "positive"
    min_effect: 0.60
    max_effect: 0.85
    rationale: "B9 (negation) verification requires tracking negation parity — computationally trivial but models may fail due to the same attention bottleneck that makes generation hard. Predict lower than B8 but higher than B7."

  - tasks: ["B7"]
    metric: "gap_collapse"
    direction: "generation_accuracy ≈ verification_accuracy"
    rationale: >
      Theorem 3 (Gap Collapse): for B7 (3-SAT), generation is NP-hard and
      verification includes a coNP-hard component. If both generation and
      verification accuracy are comparably low, the generation-verification gap
      has collapsed. Compare B7 verification accuracy against B7 generation
      accuracy from reasoning-gaps (0.51 direct, 0.51 short_cot).
      The gap is considered 'collapsed' if the absolute difference between B7
      verification accuracy and B7 generation accuracy (0.51) is < 10pp AND a
      two-proportion z-test shows p > 0.05.
      Note: this tests the gap-collapse phenomenon analogous to Theorem 3
      (which concerns HTN planning). B7 (3-SAT) has a similar structure —
      generation is NP-hard and verification includes a coNP-hard component —
      but is not a direct test of the HTN-specific result.

  - tasks: ["B1", "B2", "B3", "B4", "B5", "B6"]
    metric: "verification_accuracy_gap"
    direction: "positive"
    min_effect: 0.20
    rationale: "Gap between P-class and coNP/Arch-class should be at least 20 percentage points"

  - tasks: ["B1", "B2", "B3", "B4", "B5", "B6", "B7"]
    metric: "cross_model_consistency"
    direction: "positive"
    min_effect: 0.70
    rationale: "Same VC class should show consistent results across different (generator, verifier) pairs with correlation >0.7"

  # Theorem 2c predictions: non-monotonicity and bottleneck structure
  - tasks: ["B6", "B7"]
    metric: "between_model_error_agreement"
    direction: "B6 > B7"
    rationale: >
      Non-monotonicity (Remark 1): B6 (algorithmic, P-class, shared bottleneck)
      should show HIGHER between-model error agreement than B7 (3-SAT, coNP,
      stochastic bottleneck). This is because all models lack the same algorithm
      for B6 (rho=0.42) while different models face different hard instances for
      B7 (rho=0.06). The cross-model verification matrix should reflect this:
      verifiers should agree more on which B6 instances are hard than B7.

  - tasks: ["B4", "B7"]
    metric: "between_model_error_agreement"
    direction: "B4 > B7"
    rationale: >
      Type 4 (algorithmic, VC=P) should have HIGHER between-model error correlation
      than Type 5 (VC supseteq coNP), because error correlation tracks bottleneck
      type, not VC class. B4 errors stem from a shared algorithmic bottleneck
      (all models lack the same sorting/searching procedure), producing correlated
      failures, while B7 errors are instance-specific (stochastic bottleneck).
      This tests the central non-monotonicity prediction.

# Experimental design
design:
  condition: "answer_only"     # Verifier sees only claimed answer, must independently verify
  temperature: 0.0             # Greedy decoding for reproducibility
  generators:
    - haiku                    # claude-haiku-4-5-20251001
    - gpt4o                    # gpt-4o
    - llama70b                 # meta-llama/llama-3.1-70b-instruct
  verifiers:
    - haiku                    # claude-haiku-4-5-20251001
    - sonnet                   # claude-sonnet-4-20250514
    - gpt4o-mini               # gpt-4o-mini
    - gpt4o                    # gpt-4o (stronger verifier — tests whether capability improves verification)
  tasks: ["B1", "B2", "B3", "B4", "B5", "B6", "B7", "B8", "B9"]
  num_samples: 1               # Single verification per instance
  instances_per_difficulty: 20 # 20 instances × 5 difficulties = 100 per task
  difficulties: [1, 2, 3, 4, 5]

  sampling_strategy: "balanced_correctness"  # Equal correct/incorrect from generator

  notes: >
    Generator outputs come from reasoning-gaps evaluation (short_cot condition).
    Verifiers see only the problem and claimed answer, not the generator's reasoning.
    This tests actual verification computation, not reasoning trace consistency.

    Important: balanced sampling means the naive baseline (always predict 'correct')
    achieves 50% accuracy. All reported verification accuracies should be interpreted
    against this base rate.

    Canary run (2026-03-23) validated pipeline on B4 and B7 with 25 instances each.
    Results: B4=100% accuracy (P-class), B7=64% accuracy (coNP-class), 36pp gap.
    Zero extraction failures. Cost: $0.10 for 50 verifications = $0.002 per call.

# Canary run configuration — a small-scale test before the full run
# Purpose: catch bugs, validate pipeline, estimate real costs
canary:
  status: complete
  date: "2026-03-23"
  tasks: ["B4", "B7"]          # P-class and coNP-class representatives
  instances_per_difficulty: 5  # 5 × 5 difficulties = 25 per task
  num_samples: 1
  generator: "haiku"
  verifier: "haiku"
  results_file: "projects/verification-complexity/experiments/results/verify_haiku_by_haiku_answer_only.jsonl"
  analysis_file: "projects/verification-complexity/experiments/results/canary_analysis_answer_only.md"

  results:
    B4_accuracy: 1.00          # 25/25 perfect
    B7_accuracy: 0.64          # 16/25
    gap: 0.36                  # 36 percentage points
    extraction_failures: 0.00  # 0/50
    cost: 0.10                 # $0.10 for 50 verifications

  diagnostics:
    - check: "vc_signal_exists"
      expected: "B4 > B7"
      observed: "100% > 64%"
      status: "PASS"

    - check: "extraction_failure_rate"
      max: 0.10
      observed: 0.00
      status: "PASS"

    - check: "pipeline_completion"
      expected: "all instances produce parseable output"
      observed: "50/50 instances completed successfully"
      status: "PASS"

    - check: "cost_within_budget"
      estimated_per_instance: 0.002
      observed_per_instance: 0.002
      max_multiple_of_estimate: 2.0
      actual_multiple: 1.0
      status: "PASS"

# Budget and resource estimates
budget:
  estimated_total_usd: 57.60   # 3 gen × 4 ver × 9 tasks × 100 inst = 10,800 verifications
  estimated_per_instance_usd: 0.0053
  breakdown:
    - component: "Haiku verifier"
      instances: 2700          # 3 generators × 9 tasks × 100 instances
      cost_per_call: 0.002
      subtotal: 5.40

    - component: "Sonnet verifier"
      instances: 2700
      cost_per_call: 0.010
      subtotal: 27.00

    - component: "GPT-4o-mini verifier"
      instances: 2700
      cost_per_call: 0.002
      subtotal: 5.40

    - component: "GPT-4o verifier"
      instances: 2700
      cost_per_call: 0.005
      subtotal: 13.50

    - component: "Contingency (retries, errors)"
      subtotal: 6.30

  total_instances: 10800       # 3 gen × 4 ver × 9 tasks × 100 inst
  canary_cost_usd: 0.10
  max_allowed_usd: 70.00       # ~20% buffer

# Theoretical grounding
# Cross-reference design conditions against paper framework
theoretical_basis:
  paper_section: "Section 3 (Framework), Section 5 (Experiments)"

  theorems_under_test:
    - name: "Theorem 1 (Verification Advantage)"
      statement: >
        For a task F with verification complexity VC(F), if VC(F) ⊆ cap(M) for
        verifier model M, then M can verify outputs of generator G with accuracy
        exceeding the direct generation accuracy of weaker models.
    - name: "Theorem 2c (Self-Consistency via Bottleneck Structure)"
      statement: >
        Error correlation rho depends on the structure of the computational
        bottleneck (shared vs stochastic), not solely on VC(F). Shared bottlenecks
        produce high rho; stochastic bottlenecks produce low rho.
    - name: "Remark 1 (Non-Monotonicity)"
      statement: >
        A task with easier verification (VC=P) can exhibit higher error correlation
        than a task with harder verification (VC supseteq coNP), because the
        operative quantity is the bottleneck type, not the worst-case complexity class.

  formal_predictions:
    - condition: "VC(F) ⊆ P and cap(M) ⊇ P"
      prediction: "Verification accuracy ≥ 0.85"
      tasks: ["B1", "B2", "B3", "B4", "B5", "B6"]
      theorem: "Theorem 1"

    - condition: "VC(F) ⊇ coNP and cap(M) ⊆ P"
      prediction: "Verification accuracy < 0.75"
      tasks: ["B7"]  # 3-SAT has both NP and coNP verification
      theorem: "Theorem 1"

    - condition: "Architectural bottleneck (B8 reversal)"
      prediction: "Verification accuracy >= 0.90 (simple lookup verification)"
      tasks: ["B8"]
      theorem: "Theorem 1"

    - condition: "Architectural bottleneck (B9 negation)"
      prediction: "Verification accuracy 0.60-0.85 (attention bottleneck may affect verifier)"
      tasks: ["B9"]
      theorem: "Theorem 1"

    - condition: "Shared bottleneck (algorithmic) vs stochastic bottleneck (intractability)"
      prediction: "Between-model error agreement: B6 > B7 despite VC(B6)=P, VC(B7) supseteq coNP"
      tasks: ["B6", "B7"]
      theorem: "Theorem 2c + Remark 1"

    - condition: "Within VC=P tasks, bottleneck structure varies"
      prediction: "Between-model agreement varies within P-class: B6 (algorithmic) > B1,B2 (working memory)"
      tasks: ["B1", "B2", "B6"]
      theorem: "Theorem 2c"

  table_1_mapping:
    - type: "Type 1 (Perceptual)"
      tasks: []  # Not in benchmark suite

    - type: "Type 2 (Working Memory)"
      tasks: ["B1", "B2"]
      vc_class: "P"
      gc_class: "P/logspace"

    - type: "Type 3 (Hierarchical)"
      tasks: ["B3"]
      vc_class: "P"
      gc_class: "P"

    - type: "Type 4 (Algorithmic)"
      tasks: ["B4", "B5", "B6"]
      vc_class: "P"
      gc_class: "P"

    - type: "Type 5 (Intractability)"
      tasks: ["B7"]
      vc_class: "P/coNP"
      gc_class: "NP"

    - type: "Type 6 (Architectural)"
      tasks: ["B8", "B9"]
      vc_class: "Arch"
      gc_class: "Arch"

# Analysis plan (pre-registered)
analysis:
  primary_analysis:
    - name: "Verification accuracy by VC class"
      hypothesis: "P-class > coNP-class > Arch-class"
      method: "One-way ANOVA with Bonferroni correction"
      alpha: 0.05
      minimum_effect_size: 0.20  # Cohen's d

    - name: "Cross-model consistency within VC class"
      hypothesis: "Accuracy correlates more strongly within VC class than across"
      method: "Intraclass correlation coefficient (ICC)"
      expected_within_class_icc: "> 0.70"

    - name: "Generator-verifier interaction"
      hypothesis: "Verification accuracy independent of generator model"
      method: "Two-way ANOVA (generator × VC class)"
      expected_interaction: "not significant"

  # Theorem 2c analysis: between-model error correlation from verification data
  theorem_2c_analysis:
    - name: "Between-model error agreement by task"
      hypothesis: "Error agreement tracks bottleneck type (shared > stochastic)"
      method: >
        For each task, compute the fraction of instances where all verifiers agree
        on the outcome (all correct or all incorrect). Compare this agreement rate
        across tasks: B6 (shared bottleneck) should show higher agreement than B7
        (stochastic bottleneck). Use Cochran's Q test for significance.
        All pairwise comparisons use Bonferroni correction for the number of task
        pairs tested.
      key_comparison: "B6 agreement > B7 agreement (non-monotonicity)"

    - name: "Error correlation matrix across verifier pairs"
      hypothesis: "Pairwise error correlation mirrors known between-model rho from reasoning-gaps"
      method: >
        For each task, compute pairwise phi coefficients between verifier error
        patterns. The task-level mean phi should correlate with the known
        between-model rho values: B6 (rho=0.42) highest, B7 (rho=0.06) lowest.
        All pairwise comparisons use Bonferroni correction for the number of task
        pairs tested.

  secondary_analysis:
    - name: "Difficulty scaling"
      question: "Does verification accuracy degrade with difficulty?"
      method: "Linear regression (accuracy ~ difficulty + VC_class)"

    - name: "Error type analysis (3-SAT)"
      question: "Are B7 errors mostly false positives (UNSAT verification)?"
      method: "Contingency table analysis"

    - name: "Latency by VC class"
      question: "Does harder verification take longer?"
      method: "Kruskal-Wallis test (non-parametric)"

  figures:
    - figure_1:
        type: "comparison_bar"
        title: "Verification Accuracy by Task and VC Class"
        x_axis: "Task (B1-B9)"
        y_axis: "Verification Accuracy"
        hue: "VC Class"
        error_bars: "95% CI (bootstrap, n=1000)"
        caption: >
          Verification accuracy averaged across all (generator, verifier) pairs.
          Expected: P-class tasks (B1-B6) achieve high accuracy, B7 (P/coNP)
          shows reduced accuracy, B8-B9 (Arch) show task-dependent patterns.
          Tests Theorem 1 (Verification Advantage).

    - figure_2:
        type: "task_heatmap"
        title: "Verification Accuracy by Generator-Verifier Pair"
        rows: "Generator Model"
        columns: "Task"
        values: "Mean Verification Accuracy"
        caption: >
          Cross-model verification matrix. Rows: generator models (Haiku, GPT-4o,
          Llama-70B). Columns: tasks (B1-B9). VC class structure should emerge
          across all pairs, confirming architectural rather than model-specific
          bottleneck.

    - figure_3:
        type: "scatter_with_annotations"
        title: "Between-Model Error Agreement vs Known Error Correlation"
        x_axis: "Known between-model rho (from reasoning-gaps)"
        y_axis: "Verifier agreement rate (this experiment)"
        annotations: "Task labels (B1-B9)"
        caption: >
          Tests non-monotonicity (Remark 1): verifier agreement should track
          bottleneck type, not VC class. B6 (P-class, rho=0.42) expected to show
          higher agreement than B7 (coNP, rho=0.06). If the correlation is
          positive, verification data independently validates the bottleneck
          structure theory from Theorem 2c.

  exploratory:
    - "Does verifier size (Haiku vs Sonnet) improve coNP verification?"
    - "Are certain generator errors easier to detect than others?"
    - "Does balanced sampling (equal correct/incorrect) bias results?"
    - "Does between-model error agreement pattern hold per verifier or only in aggregate?"

