  - id: "9a1f2b4d-3c5e-6d8f-2a4b-1e7c9d3f5a8b"
    title: "Monitorability as a Complexity Class: When Can We Detect Misaligned Reasoning?"
    thesis: "Chain-of-thought monitorability can be formalized as a computational complexity problem, with verifiable reasoning tasks forming a complexity class analogous to NP—and this characterization reveals fundamental limits on what types of reasoning can be monitored for safety."
    motivation: |
      OpenAI's MonitorBench (2026) provides empirical evaluations showing CoT monitoring works
      for current models but is "fragile." The Frontier Model Forum warns it could be "easily lost."
      However, no formal theory explains *why* some reasoning is monitorable and other reasoning isn't.
      This connects to verification-complexity (backlog item) and Information-Theoretic Limits paper
      (#16). The missing piece: a complexity-theoretic characterization of monitorability itself.
    approach: "theory"
    source_papers:
      - "MonitorBench_OpenAI_2026"  # MonitorBench
      - "arx_2507_11473"  # Chain of Thought Monitorability (Bowman et al.)
      - "arx_2603_28650"  # Information-Theoretic Limits of Safety Verification
    gap_type: "missing_theory"
    target_venue: "NeurIPS 2026"
    target_deadline: "2026-05-15"
    estimated_effort_weeks: 10
    estimated_cost_usd: 100
    portfolio_connection: "extends verification-complexity | complements self-improvement-limits"
    topics:
      - AI safety
      - monitorability
      - complexity theory
      - interactive proofs
      - verification
      - chain-of-thought

    score: 88
    scoring:
      novelty: 24                    # /25 - New connection: monitorability as complexity class
      feasibility: 15                # /20 - Ambitious theory, 10 weeks
      impact: 15                     # /15 - Changes safety community's understanding
      venue_fit: 15                  # /15 - Perfect NeurIPS AI safety + theory fit
      portfolio_fit: 14              # /15 - Core portfolio fit (verification-complexity)
      risk: 8                        # /10 - High conceptual risk, may be hard to formalize

    detailed_scoring_rationale: |
      Novelty (24/25): No prior work connects monitorability to complexity theory. OpenAI's
      MonitorBench is purely empirical. Bowman et al. (2025) discuss monitorability qualitatively
      but don't formalize it. This idea introduces a new framework. Bonus +2 for missing_theory gap.
      Not 25 because adjacent work exists on verification complexity (interactive proofs, PSPACE).

      Feasibility (15/20): Highly ambitious theory requiring synthesis of AI safety concepts
      (monitorability) and complexity theory (verification classes). 10-week estimate reflects
      difficulty. Main risk: formalization may be too hard or produce vacuous results (e.g.,
      "monitoring is as hard as the original problem"). Mitigations: start with simple reasoning
      tasks, build up complexity hierarchy incrementally.

      Impact (15/15): If successful, reshapes how AI safety community thinks about oversight.
      Provides principled foundation for claims like "monitoring will fail for sufficiently
      complex reasoning." Critical for long-term safety arguments. High citation potential across
      safety and theory communities.

      Venue Fit (15/15): NeurIPS 2026 perfect fit—intersection of theory and safety. Recent
      NeurIPS accepted papers on AI safety with formal methods. Deadline tight (May 2026) but
      achievable for theory paper (no experiments needed).

      Portfolio Fit (14/15): Direct extension of "verification-complexity" backlog idea. Forms
      theoretical trilogy with "self-improvement-limits" and "reasoning-gaps." Addresses core
      platform concern (can we verify autonomous research?). -1 because very ambitious, may
      be too broad for current portfolio stage.

      Risk (8/10): Main risk is formalization failing to capture intuitive notion of monitorability.
      If formal definition is too strong, everything is non-monitorable (vacuous). If too weak,
      everything is monitorable (uninformative). Requires careful calibration. Fallback: publish
      preliminary framework as position paper at workshop, then refine.

