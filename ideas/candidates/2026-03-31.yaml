  - id: "58f9c3a1-2e9f-4d8a-b5e2-7c1d8f3e9a4b"
    title: "Fundamental Limits of Recursive Self-Improvement Without Collapse"
    thesis: "Recursive self-improvement in language models is fundamentally bounded by a collapse horizon—a predictable point at which self-generated training data causes irreversible distributional narrowing—and this horizon can be formally characterized using information-theoretic drift measures."
    motivation: |
      Recent work (CoVerRL, Stabilizing Self-Training, "Can LRMs Self-Train?") demonstrates that
      recursive self-training faces a critical failure mode: models maximize self-consistency at
      the expense of diversity, leading to consensus traps and reward hacking. While empirical
      methods (verifier co-evolution, symbolic alignment) show promise, no formal theory
      characterizes the fundamental limits. This gap is critical: without understanding the
      theoretical boundaries, we cannot distinguish between implementation failures and
      fundamental impossibilities.
    approach: "theory"
    source_papers:
      - "arx_2603_17775"  # CoVerRL
      - "arx_2505_21444"  # Can LRMs Self-Train?
      - "arx_2603_28650"  # Information-Theoretic Limits of Safety Verification
    gap_type: "missing_theory"
    target_venue: "NeurIPS 2026"
    target_deadline: "2026-05-15"
    estimated_effort_weeks: 8
    estimated_cost_usd: 50
    portfolio_connection: "extends self-improvement-limits | complements verification-complexity"
    topics:
      - self-improvement
      - recursive training
      - model collapse
      - information theory
      - impossibility results

    score: 84
    scoring:
      novelty: 23                    # /25 - New formalization of collapse dynamics
      feasibility: 16                # /20 - Theory work with known tools, 8 weeks
      impact: 14                     # /15 - Changes how field thinks about limits
      venue_fit: 15                  # /15 - Perfect NeurIPS theory fit
      portfolio_fit: 13              # /15 - Extends self-improvement-limits directly
      risk: 9                        # /10 - Well-bounded, builds on existing results

    detailed_scoring_rationale: |
      Novelty (23/25): Recent papers (CoVerRL, "Can LRMs Self-Train?") identify the consensus
      trap empirically but lack formal characterization. This idea formalizes the collapse
      horizon using information theory—an unexplored angle. Bonus +2 for missing_theory gap.
      Not full 25 because some related work exists on distributional collapse (Shumailov 2023).

      Feasibility (16/20): Pure theory requiring measure-theoretic analysis of LLM training
      dynamics. Tools exist (information theory, PAC-Bayes). 8-week estimate is tight but
      achievable. Main uncertainty: deriving tight bounds may require stronger assumptions
      than desirable. Can still publish with loose bounds as proof-of-concept.

      Impact (14/15): Resolves open question about whether recursive drift is avoidable or
      fundamental. High citation potential as self-training becomes standard. Provides
      framework others will build on. Not 15 because impact concentrated in specific subfield.

      Venue Fit (15/15): NeurIPS Theory Track loves impossibility results with practical
      implications. Recent acceptance of similar work (e.g., optimization impossibility,
      learning theory bounds). Deadline May 15, 2026 is tight but reachable.

      Portfolio Fit (13/15): Direct extension of "self-improvement-limits" backlog idea.
      Complements "verification-complexity" by characterizing what can't be learned without
      verification. Shares theoretical methodology with reasoning-gaps. High synergy.

      Risk (9/10): Main risk is proof technique failing to yield tight bounds. Mitigations:
      (1) can publish with existence results even if bounds are loose, (2) empirical
      validation can strengthen weak theory, (3) negative results (showing bounds are hard
      to derive) are publishable as hardness-of-analysis results.

