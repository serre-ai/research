  - id: "7d2e4f1a-8b3c-4e5d-9f2a-6c8b1d4e7f3a"
    title: "The Consensus-Diversity Tradeoff in Self-Consistent Reasoning"
    thesis: "Self-consistency methods face a fundamental tradeoff between answer confidence (consensus) and reasoning diversity, and this tradeoff can be optimized through diversity-preserving aggregation that outperforms majority voting without ground-truth supervision."
    motivation: |
      Self-consistency (Wang et al., 2023) is the dominant method for improving LLM reasoning,
      but recent work identifies a critical flaw: majority voting amplifies confident errors
      when the model converges on the wrong answer (CoVerRL, Confidence Improves Self-Consistency).
      5-6 papers in the provided set address this problem empirically (ranked voting, confidence
      weighting, verifier training), but none formalize the underlying consensus-diversity tradeoff.
      Gap-detector identified Slim-SC as needing formal analysis. This idea provides that theory.
    approach: "both"
    source_papers:
      - "s2_5e2ac18334af51aa36fa619316d687ef74778306"  # Slim-SC
      - "arx_2603_17775"  # CoVerRL
      - "s2_ranked_voting"  # Ranked Voting based Self-Consistency
      - "s2_confidence_improves"  # Confidence Improves Self-Consistency
    gap_type: "missing_theory"
    target_venue: "ICLR 2026"
    target_deadline: "2026-10-01"
    estimated_effort_weeks: 6
    estimated_cost_usd: 200
    portfolio_connection: "complements verification-complexity | extends reasoning-gaps empirically"
    topics:
      - self-consistency
      - majority voting
      - reasoning aggregation
      - diversity preservation
      - test-time scaling

    score: 81
    scoring:
      novelty: 21                    # /25 - Formalizes known empirical problem
      feasibility: 18                # /20 - Theory + controlled experiments
      impact: 13                     # /15 - Solid contribution, widely applicable
      venue_fit: 14                  # /15 - Good ICLR fit
      portfolio_fit: 11              # /15 - Related but not core to portfolio
      risk: 9                        # /10 - Well-bounded with empirical validation

    detailed_scoring_rationale: |
      Novelty (21/25): The consensus trap is empirically well-documented (6+ papers in 2025-2026),
      but formal characterization is missing. This idea provides it. Bonus +2 for missing_theory gap
      (Slim-SC). Not higher because the problem is known—novelty is in the formalization, not
      problem identification.

      Feasibility (18/20): Theory component requires information-theoretic or PAC-Bayesian analysis
      of aggregation methods. Empirical component tests diversity-preserving aggregators on standard
      benchmarks (GSM8K, MATH, etc.). 6 weeks is achievable. Main risk is theory may be hard to
      prove tight bounds for; empirical results can carry the paper if needed.

      Impact (13/15): Self-consistency is ubiquitous in LLM reasoning. A better aggregation method
      has immediate practical value. Theory provides principled foundation. Not 15 because this is
      incremental improvement over existing methods, not paradigm shift.

      Venue Fit (14/15): ICLR values papers with both theory and experiments. Recent ICLR papers
      on test-time scaling and reasoning (e.g., STaR variants, self-verification). Oct 2026 deadline
      gives ample time. -1 because ICLR prefers broader ML contributions; this is more narrow
      (reasoning-specific).

      Portfolio Fit (11/15): Complements verification-complexity (shows where verification is needed)
      and reasoning-gaps (provides better evaluation method). But not core to portfolio's theoretical
      program. More of a methods contribution than fundamental limits. Still valuable for diversification.

      Risk (9/10): Low risk. Even if theory is weak, empirical results showing diversity-preserving
      aggregation outperforms majority voting are publishable. Fallback: purely empirical comparison
      of aggregation methods.

